<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 加密货币分析系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #6366f1;
            --primary-hover: #4f46e5;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border-color: #334155;
            --success-color: #10b981;
            --error-color: #ef4444;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }

        .register-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .register-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
        }

        .register-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .register-logo {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .register-title {
            color: var(--text-primary);
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .register-subtitle {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .form-label {
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
        }

        .form-control {
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
        }

        .form-control:focus {
            background: var(--bg-dark);
            border-color: var(--primary-color);
            color: var(--text-primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .form-control::placeholder {
            color: var(--text-secondary);
        }

        .form-control.is-valid {
            border-color: var(--success-color);
        }

        .form-control.is-invalid {
            border-color: var(--error-color);
        }

        .input-group-text {
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
        }

        .btn-primary {
            background: var(--primary-color);
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            width: 100%;
            transition: all 0.2s;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-primary:disabled {
            background: var(--border-color);
            cursor: not-allowed;
        }

        .login-link {
            text-align: center;
            margin-top: 24px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .login-link a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .alert {
            border-radius: 8px;
            font-size: 14px;
        }

        .password-toggle {
            cursor: pointer;
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            border-left: none;
        }

        .password-toggle:hover {
            color: var(--primary-color);
        }

        .spinner-border-sm {
            width: 1rem;
            height: 1rem;
        }

        .validation-feedback {
            font-size: 12px;
            margin-top: 4px;
        }

        .validation-feedback.valid {
            color: var(--success-color);
        }

        .validation-feedback.invalid {
            color: var(--error-color);
        }

        .password-strength {
            height: 4px;
            border-radius: 2px;
            margin-top: 8px;
            background: var(--border-color);
            overflow: hidden;
        }

        .password-strength-bar {
            height: 100%;
            transition: all 0.3s;
        }

        .strength-weak { width: 33%; background: var(--error-color); }
        .strength-medium { width: 66%; background: #f59e0b; }
        .strength-strong { width: 100%; background: var(--success-color); }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-card">
            <div class="register-header">
                <div class="register-logo">📊</div>
                <h1 class="register-title">创建新账户</h1>
                <p class="register-subtitle">注册后即可使用全部功能</p>
            </div>

            <div id="alert-container"></div>

            <form id="register-form">
                <div class="mb-3">
                    <label for="username" class="form-label">用户名</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input type="text" class="form-control" id="username"
                               placeholder="3-50个字符" required autofocus>
                    </div>
                    <div id="username-feedback" class="validation-feedback"></div>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">邮箱</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                        <input type="email" class="form-control" id="email"
                               placeholder="your@email.com" required>
                    </div>
                    <div id="email-feedback" class="validation-feedback"></div>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">密码</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" class="form-control" id="password"
                               placeholder="至少6个字符" required>
                        <span class="input-group-text password-toggle" onclick="togglePassword('password')">
                            <i class="bi bi-eye" id="password-icon"></i>
                        </span>
                    </div>
                    <div class="password-strength">
                        <div id="password-strength-bar" class="password-strength-bar"></div>
                    </div>
                    <div id="password-feedback" class="validation-feedback"></div>
                </div>

                <div class="mb-4">
                    <label for="confirm-password" class="form-label">确认密码</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                        <input type="password" class="form-control" id="confirm-password"
                               placeholder="再次输入密码" required>
                        <span class="input-group-text password-toggle" onclick="togglePassword('confirm-password')">
                            <i class="bi bi-eye" id="confirm-password-icon"></i>
                        </span>
                    </div>
                    <div id="confirm-password-feedback" class="validation-feedback"></div>
                </div>

                <button type="submit" class="btn btn-primary" id="register-btn">
                    <span id="btn-text">注 册</span>
                    <span id="btn-loading" class="d-none">
                        <span class="spinner-border spinner-border-sm me-2"></span>注册中...
                    </span>
                </button>
            </form>

            <div class="login-link">
                已有账户？<a href="/login">立即登录</a>
            </div>
        </div>
    </div>

    <script>
        // API基础URL
        const API_BASE = '';

        // 切换密码可见性
        function togglePassword(inputId) {
            const passwordInput = document.getElementById(inputId);
            const icon = document.getElementById(inputId + '-icon');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.className = 'bi bi-eye-slash';
            } else {
                passwordInput.type = 'password';
                icon.className = 'bi bi-eye';
            }
        }

        // 显示提示
        function showAlert(message, type = 'danger') {
            const container = document.getElementById('alert-container');
            container.innerHTML = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
        }

        // 设置按钮状态
        function setLoading(loading) {
            const btn = document.getElementById('register-btn');
            const btnText = document.getElementById('btn-text');
            const btnLoading = document.getElementById('btn-loading');

            btn.disabled = loading;
            btnText.classList.toggle('d-none', loading);
            btnLoading.classList.toggle('d-none', !loading);
        }

        // 验证用户名
        function validateUsername(username) {
            const feedback = document.getElementById('username-feedback');
            const input = document.getElementById('username');

            if (username.length < 3) {
                feedback.textContent = '用户名至少3个字符';
                feedback.className = 'validation-feedback invalid';
                input.classList.add('is-invalid');
                input.classList.remove('is-valid');
                return false;
            }
            if (username.length > 50) {
                feedback.textContent = '用户名最多50个字符';
                feedback.className = 'validation-feedback invalid';
                input.classList.add('is-invalid');
                input.classList.remove('is-valid');
                return false;
            }
            if (!/^[a-zA-Z0-9_]+$/.test(username)) {
                feedback.textContent = '用户名只能包含字母、数字和下划线';
                feedback.className = 'validation-feedback invalid';
                input.classList.add('is-invalid');
                input.classList.remove('is-valid');
                return false;
            }

            feedback.textContent = '用户名可用';
            feedback.className = 'validation-feedback valid';
            input.classList.remove('is-invalid');
            input.classList.add('is-valid');
            return true;
        }

        // 验证邮箱
        function validateEmail(email) {
            const feedback = document.getElementById('email-feedback');
            const input = document.getElementById('email');
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if (!emailRegex.test(email)) {
                feedback.textContent = '请输入有效的邮箱地址';
                feedback.className = 'validation-feedback invalid';
                input.classList.add('is-invalid');
                input.classList.remove('is-valid');
                return false;
            }

            feedback.textContent = '邮箱格式正确';
            feedback.className = 'validation-feedback valid';
            input.classList.remove('is-invalid');
            input.classList.add('is-valid');
            return true;
        }

        // 检查密码强度
        function checkPasswordStrength(password) {
            let strength = 0;

            if (password.length >= 6) strength++;
            if (password.length >= 10) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[a-z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;

            return strength;
        }

        // 验证密码
        function validatePassword(password) {
            const feedback = document.getElementById('password-feedback');
            const input = document.getElementById('password');
            const strengthBar = document.getElementById('password-strength-bar');
            const strength = checkPasswordStrength(password);

            // 更新强度条
            strengthBar.className = 'password-strength-bar';
            if (strength <= 2) {
                strengthBar.classList.add('strength-weak');
            } else if (strength <= 4) {
                strengthBar.classList.add('strength-medium');
            } else {
                strengthBar.classList.add('strength-strong');
            }

            if (password.length < 6) {
                feedback.textContent = '密码至少6个字符';
                feedback.className = 'validation-feedback invalid';
                input.classList.add('is-invalid');
                input.classList.remove('is-valid');
                return false;
            }

            const strengthText = strength <= 2 ? '弱' : (strength <= 4 ? '中' : '强');
            feedback.textContent = `密码强度: ${strengthText}`;
            feedback.className = `validation-feedback ${strength <= 2 ? 'invalid' : 'valid'}`;
            input.classList.remove('is-invalid');
            input.classList.add('is-valid');
            return true;
        }

        // 验证确认密码
        function validateConfirmPassword() {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const feedback = document.getElementById('confirm-password-feedback');
            const input = document.getElementById('confirm-password');

            if (confirmPassword !== password) {
                feedback.textContent = '两次输入的密码不一致';
                feedback.className = 'validation-feedback invalid';
                input.classList.add('is-invalid');
                input.classList.remove('is-valid');
                return false;
            }

            if (confirmPassword.length > 0) {
                feedback.textContent = '密码匹配';
                feedback.className = 'validation-feedback valid';
                input.classList.remove('is-invalid');
                input.classList.add('is-valid');
            }
            return true;
        }

        // 实时验证
        document.getElementById('username').addEventListener('input', (e) => {
            validateUsername(e.target.value);
        });

        document.getElementById('email').addEventListener('input', (e) => {
            validateEmail(e.target.value);
        });

        document.getElementById('password').addEventListener('input', (e) => {
            validatePassword(e.target.value);
            validateConfirmPassword();
        });

        document.getElementById('confirm-password').addEventListener('input', () => {
            validateConfirmPassword();
        });

        // 注册表单提交
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            // 验证
            const isUsernameValid = validateUsername(username);
            const isEmailValid = validateEmail(email);
            const isPasswordValid = validatePassword(password);
            const isConfirmValid = validateConfirmPassword();

            if (!isUsernameValid || !isEmailValid || !isPasswordValid || !isConfirmValid) {
                showAlert('请检查输入信息');
                return;
            }

            if (password !== confirmPassword) {
                showAlert('两次输入的密码不一致');
                return;
            }

            setLoading(true);

            try {
                const response = await fetch(`${API_BASE}/api/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    showAlert('注册成功！正在跳转到登录页面...', 'success');
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);
                } else {
                    showAlert(data.detail || data.error || '注册失败');
                }
            } catch (error) {
                console.error('注册错误:', error);
                showAlert('网络错误，请稍后重试');
            } finally {
                setLoading(false);
            }
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/system_i18n.js"></script>
</body>
</html>
