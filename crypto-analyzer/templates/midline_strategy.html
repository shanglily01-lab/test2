<!DOCTYPE html>
<html class="dark" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>中线策略 | Neural Obsidian</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  .mono { font-family: 'JetBrains Mono', monospace; }
  body { font-family: 'Manrope', sans-serif; }
  h1, h2, h3 { font-family: 'Space Grotesk', sans-serif; }
  .chip { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; }
  .chip-on { background: rgba(73,244,200,0.15); color: #49f4c8; border: 1px solid rgba(73,244,200,0.3); }
  .chip-off { background: rgba(168,171,178,0.1); color: #a8abb2; border: 1px solid rgba(168,171,178,0.2); }
  .chip-long { background: rgba(73,244,200,0.12); color: #49f4c8; }
  .chip-short { background: rgba(255,113,108,0.12); color: #ff716c; }
  .toggle { position: relative; display: inline-block; width: 44px; height: 24px; }
  .toggle input { display: none; }
  .toggle .slider { position: absolute; cursor: pointer; top:0; left:0; right:0; bottom:0; background: #334155; border-radius: 12px; transition: .2s; }
  .toggle .slider:before { position: absolute; content: ''; height: 18px; width: 18px; left: 3px; bottom: 3px; background: #ebeef5; border-radius: 50%; transition: .2s; }
  .toggle input:checked + .slider { background: #49f4c8; }
  .toggle input:checked + .slider:before { transform: translateX(20px); background: #002045; }
</style>
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "on-surface": "#ebeef5", "surface-container-low": "#0f1419",
          "outline": "#72767c", "surface-container-highest": "#20262e",
          "surface": "#0a0f14", "error": "#ff716c",
          "on-surface-variant": "#a8abb2", "surface-container": "#151a20",
          "outline-variant": "#44484e", "primary": "#49f4c8",
          "background": "#0a0f14", "secondary": "#5b9eff",
        },
      },
    },
  }
</script>
</head>
<body class="bg-surface text-on-surface">
{% include "partials/desktop_sidebar.html" %}
<main class="ml-[240px] min-h-screen">

<header class="border-b border-outline-variant/10 px-8 py-5 flex items-center justify-between flex-wrap gap-4">
  <div>
    <h1 class="text-2xl font-bold tracking-tight">中线策略</h1>
    <p class="text-[11px] text-on-surface-variant mt-1 tracking-wide">
      量化 · config.yaml 全池 · 30×1d / 1w×1h / 4h×15m · 限价 ±1% · SL6%/TP3% · 持仓 8h · 仅模拟 · 持仓顾问+ai-trail-tp
    </p>
  </div>
  <div class="flex items-center gap-3 flex-wrap">
    <span id="live-chip" class="chip chip-off">暂不实盘</span>
    <button id="btn-run-all" class="px-3 py-1.5 rounded-lg bg-primary text-[#002045] text-xs font-semibold hover:opacity-90">手动扫描两路</button>
    <button id="btn-refresh" class="px-3 py-1.5 rounded-lg bg-surface-container text-xs text-on-surface-variant hover:bg-surface-container-highest">刷新</button>
  </div>
</header>

<section class="px-8 py-5 grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-3">
  <div class="bg-surface-container-low rounded-xl p-4">
    <p class="text-[10px] uppercase text-on-surface-variant mb-1">做多开关</p>
    <label class="toggle"><input type="checkbox" id="tog-long"/><span class="slider"></span></label>
    <p class="text-[10px] text-on-surface-variant mt-2" id="stat-long-open">持仓 --</p>
  </div>
  <div class="bg-surface-container-low rounded-xl p-4">
    <p class="text-[10px] uppercase text-on-surface-variant mb-1">做空开关</p>
    <label class="toggle"><input type="checkbox" id="tog-short"/><span class="slider"></span></label>
    <p class="text-[10px] text-on-surface-variant mt-2" id="stat-short-open">持仓 --</p>
  </div>
  <div class="bg-surface-container-low rounded-xl p-4">
    <p class="text-[10px] uppercase text-on-surface-variant mb-1">扫描周期</p>
    <p class="mono text-xl" id="p-interval">--</p>
    <p class="text-[10px] text-on-surface-variant">小时</p>
  </div>
  <div class="bg-surface-container-low rounded-xl p-4">
    <p class="text-[10px] uppercase text-on-surface-variant mb-1">限价偏移</p>
    <p class="mono text-sm" id="p-offset">--</p>
  </div>
  <div class="bg-surface-container-low rounded-xl p-4">
    <p class="text-[10px] uppercase text-on-surface-variant mb-1">SL / TP</p>
    <p class="mono text-sm" id="p-sltp">--</p>
  </div>
  <div class="bg-surface-container-low rounded-xl p-4">
    <p class="text-[10px] uppercase text-on-surface-variant mb-1">持仓 / 杠杆</p>
    <p class="mono text-sm" id="p-hold">--</p>
  </div>
</section>

<section class="px-8 pb-4">
  <div class="bg-surface-container rounded-xl p-4 flex flex-wrap gap-3 items-end">
    <div>
      <label class="text-[10px] text-on-surface-variant">周期(h)</label>
      <input id="inp-interval" type="number" min="1" max="48" class="block mt-1 w-20 bg-surface border border-outline-variant/30 rounded px-2 py-1 text-sm mono"/>
    </div>
    <div>
      <label class="text-[10px] text-on-surface-variant">做多偏移%</label>
      <input id="inp-long-off" type="number" step="0.1" min="0.1" max="5" class="block mt-1 w-20 bg-surface border border-outline-variant/30 rounded px-2 py-1 text-sm mono"/>
    </div>
    <div>
      <label class="text-[10px] text-on-surface-variant">做空偏移%</label>
      <input id="inp-short-off" type="number" step="0.1" min="0.1" max="5" class="block mt-1 w-20 bg-surface border border-outline-variant/30 rounded px-2 py-1 text-sm mono"/>
    </div>
    <button id="btn-save-params" class="px-3 py-1.5 rounded-lg bg-surface-container-highest text-xs">保存参数</button>
    <p class="text-[10px] text-on-surface-variant self-center" id="params-msg"></p>
  </div>
</section>

<section class="px-8 pb-4">
  <div class="flex items-center justify-between mb-3">
    <h2 class="text-sm font-semibold">机会分析</h2>
    <div class="flex gap-2 items-center">
      <select id="sel-run" class="bg-surface border border-outline-variant/30 rounded px-2 py-1 text-xs mono"></select>
      <label class="text-[11px] text-on-surface-variant flex items-center gap-1">
        <input type="checkbox" id="chk-passed-only"/> 仅看挂单/通过相关
      </label>
    </div>
  </div>
  <div id="run-summary" class="text-[11px] text-on-surface-variant mb-2 mono">选择一轮扫描查看 verdicts</div>
  <div class="overflow-x-auto rounded-xl border border-outline-variant/10">
    <table class="w-full text-left text-xs">
      <thead class="bg-surface-container text-on-surface-variant uppercase text-[10px]">
        <tr>
          <th class="px-3 py-2">Symbol</th>
          <th class="px-3 py-2">方向</th>
          <th class="px-3 py-2">动作</th>
          <th class="px-3 py-2">分数</th>
          <th class="px-3 py-2">原因 / 摘要</th>
        </tr>
      </thead>
      <tbody id="verdict-body" class="divide-y divide-outline-variant/10"></tbody>
    </table>
  </div>
</section>

<section class="px-8 pb-10 grid md:grid-cols-2 gap-4">
  <div>
    <h2 class="text-sm font-semibold mb-3">当前持仓</h2>
    <div id="pos-open" class="space-y-2 text-xs"></div>
  </div>
  <div>
    <h2 class="text-sm font-semibold mb-3">最近轮次</h2>
    <div id="runs-list" class="space-y-2 text-xs mono"></div>
  </div>
</section>

</main>
<script src="/static/js/midline_strategy_page.js?v=1"></script>
</body></html>
