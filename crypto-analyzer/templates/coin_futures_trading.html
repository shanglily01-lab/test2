<!DOCTYPE html>
<html class="dark" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Neural Obsidian - 交易记录</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "primary": "#49f4c8", "secondary": "#5b9eff", "tertiary": "#ff6e80",
        "background": "#0a0f14", "surface": "#0a0f14", "on-surface": "#ebeef5",
        "on-surface-variant": "#a8abb2", "surface-container": "#151a20",
        "surface-container-low": "#0f1419", "surface-container-highest": "#20262e",
        "outline-variant": "#44484e", "error": "#ff716c"
      },
      fontFamily: { "headline": ["Space Grotesk"], "body": ["Manrope"], "mono": ["JetBrains Mono"] }
    }
  }
}
</script>
<style>
  body { font-family: 'Manrope', sans-serif; background: #0a0f14; color: #ebeef5; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
  .monospace { font-family: 'JetBrains Mono', monospace; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: #0f1520; }
  ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #49f4c8; }
</style>
</head>
<body class="flex min-h-screen overflow-hidden">
{% include "partials/desktop_sidebar.html" %}
<main class="ml-[240px] flex-1 h-screen flex flex-col bg-background overflow-hidden">
<header class="fixed top-0 right-0 left-[240px] h-16 bg-[#0a0f14]/80 backdrop-blur-xl flex items-center justify-between px-8 z-40 border-b border-outline-variant/10">
<h2 class="font-headline font-bold text-lg tracking-tight">交易记录</h2>
<a href="/futures_trading" class="text-xs text-primary hover:underline flex items-center gap-1">
  <span class="material-symbols-outlined text-[16px]">arrow_back</span>返回合约交易
</a>
</header>

<div class="mt-16 p-8 flex-1 overflow-y-auto space-y-6">
<div>
<h3 class="font-headline text-3xl font-bold tracking-tighter">U本位 · 历史交易记录</h3>
<p class="text-on-surface-variant text-sm mt-1">模拟盘 account_id=2 · 已平仓成交明细</p>
</div>

<div class="grid grid-cols-2 md:grid-cols-4 gap-4">
<div class="bg-surface-container p-5 rounded-xl border-l-2 border-primary/30">
<p class="text-xs text-on-surface-variant uppercase tracking-widest mb-2">总交易数</p>
<p id="stat-total-trades" class="text-2xl font-headline font-bold monospace">--</p>
</div>
<div class="bg-surface-container p-5 rounded-xl">
<p class="text-xs text-on-surface-variant uppercase tracking-widest mb-2">盈亏笔数</p>
<p id="stat-win-loss" class="text-2xl font-headline font-bold monospace">--</p>
<p id="stat-win-rate" class="text-[10px] text-on-surface-variant font-mono mt-1">胜率 --</p>
</div>
<div class="bg-surface-container p-5 rounded-xl border-l-2 border-primary">
<p class="text-xs text-on-surface-variant uppercase tracking-widest mb-2">总已实现</p>
<p id="stat-total-pnl" class="text-2xl font-headline font-bold monospace">--</p>
</div>
<div class="bg-surface-container p-5 rounded-xl">
<p class="text-xs text-on-surface-variant uppercase tracking-widest mb-2">账户余额</p>
<p id="stat-balance" class="text-2xl font-headline font-bold monospace">--</p>
</div>
</div>

<div class="bg-surface-container-low rounded-2xl overflow-hidden shadow-2xl">
<div class="p-5 flex flex-wrap gap-3 items-end justify-between bg-surface-container border-b border-outline-variant/10">
<h4 class="font-headline font-bold flex items-center gap-2">
<span class="w-1 h-4 bg-primary rounded-full"></span>成交记录
</h4>
<div class="flex flex-wrap items-end gap-2">
<input id="history-search" type="text" placeholder="交易对，如 BTC/USDT" class="bg-surface-container-highest border border-outline-variant/20 rounded-lg px-3 py-2 text-xs text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:border-primary/50 w-40"/>
<select id="history-side-filter" class="bg-surface-container-highest border border-outline-variant/20 rounded-lg px-3 py-2 text-xs text-on-surface focus:outline-none focus:border-primary/50">
<option value="">全部方向</option>
<option value="LONG">LONG</option>
<option value="SHORT">SHORT</option>
</select>
<select id="history-limit" class="bg-surface-container-highest border border-outline-variant/20 rounded-lg px-3 py-2 text-xs text-on-surface focus:outline-none focus:border-primary/50">
<option value="30">每页 30 条</option>
<option value="50">每页 50 条</option>
<option value="100">每页 100 条</option>
</select>
<button id="history-query-btn" onclick="loadHistory(1)" class="px-4 py-2 bg-primary text-background rounded-lg text-xs font-bold hover:opacity-90 transition-opacity flex items-center gap-1">
<span class="material-symbols-outlined text-[16px]">search</span>查询
</button>
<button onclick="loadHistory(_historyPage)" class="px-3 py-2 bg-primary/10 hover:bg-primary/20 border border-primary/20 text-primary rounded-lg text-xs font-bold transition-colors">刷新</button>
</div>
</div>
<div class="overflow-x-auto">
<table class="w-full text-left border-collapse">
<thead>
<tr class="text-[10px] uppercase tracking-widest text-on-surface-variant border-b border-outline-variant/10 bg-surface-container">
<th class="px-5 py-4 font-semibold whitespace-nowrap">开仓 / 平仓时间</th>
<th class="px-5 py-4 font-semibold whitespace-nowrap">持仓时长</th>
<th class="px-5 py-4 font-semibold whitespace-nowrap">交易对</th>
<th class="px-5 py-4 font-semibold whitespace-nowrap">方向</th>
<th class="px-5 py-4 font-semibold whitespace-nowrap">开仓价</th>
<th class="px-5 py-4 font-semibold whitespace-nowrap">结平价</th>
<th class="px-5 py-4 font-semibold whitespace-nowrap">开仓信号</th>
<th class="px-5 py-4 font-semibold whitespace-nowrap">平仓原因</th>
<th class="px-5 py-4 font-semibold text-right whitespace-nowrap">保证金</th>
<th class="px-5 py-4 font-semibold text-right whitespace-nowrap">手续费</th>
<th class="px-5 py-4 font-semibold text-right whitespace-nowrap">实现盈亏</th>
<th class="px-5 py-4 font-semibold text-right whitespace-nowrap">收益率</th>
</tr>
</thead>
<tbody id="history-tbody" class="text-xs divide-y divide-outline-variant/5">
<tr><td colspan="12" class="px-6 py-8 text-center text-on-surface-variant text-xs">点击「查询」加载记录</td></tr>
</tbody>
</table>
</div>
<div class="px-5 py-3 bg-surface-container border-t border-outline-variant/10 flex items-center justify-between flex-wrap gap-3">
<span id="history-count-label" class="text-xs text-on-surface-variant font-mono">--</span>
<div id="history-pagination" class="flex items-center gap-1"></div>
</div>
</div>
</div>
</main>

<script>
var ACCOUNT_ID = 2;
var _historyAllTrades = [];
var _historyPage = 1;
var _historyPageSize = 30;
var _historyTotalCount = 0;

function fmtPrice(p) {
  if (p === null || p === undefined || p === '') return '--';
  var n = parseFloat(p);
  if (isNaN(n)) return '--';
  if (n >= 1000) return n.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
  if (n >= 1) return n.toFixed(4);
  return n.toFixed(6);
}
function fmtPnl(n) {
  if (n === null || n === undefined || isNaN(n)) return '--';
  var sign = n >= 0 ? '+' : '';
  return sign + n.toFixed(2);
}
function fmtUsdt(n) {
  if (n === null || n === undefined || isNaN(parseFloat(n))) return '--';
  return parseFloat(n).toFixed(2);
}
function fmtTime(t) {
  if (!t) return '--';
  try {
    var ts = (typeof t === 'string' && !t.endsWith('Z') && !/[+-]\d{2}:\d{2}$/.test(t)) ? t + 'Z' : t;
    var d = new Date(ts);
    if (isNaN(d.getTime())) return '--';
    var u = new Date(d.getTime() + 8 * 3600000);
    var pad = function(x) { return String(x).padStart(2, '0'); };
    return (u.getUTCMonth()+1) + '-' + pad(u.getUTCDate()) + ' ' + pad(u.getUTCHours()) + ':' + pad(u.getUTCMinutes());
  } catch(e) { return '--'; }
}
function fmtDuration(openT, closeT) {
  if (!openT || !closeT) return '--';
  try {
    var toMs = function(t) {
      var ts = (typeof t === 'string' && !t.endsWith('Z') && !/[+-]\d{2}:\d{2}$/.test(t)) ? t + 'Z' : t;
      return new Date(ts).getTime();
    };
    var ms = toMs(closeT) - toMs(openT);
    if (isNaN(ms) || ms < 0) return '--';
    var totalMin = Math.floor(ms / 60000);
    var h = Math.floor(totalMin / 60);
    var m = totalMin % 60;
    return h > 0 ? (h + 'h ' + m + 'm') : (m + 'm');
  } catch(e) { return '--'; }
}

function applyHistoryFilter(resetPage) {
  if (resetPage) _historyPage = 1;
  var tbody = document.getElementById('history-tbody');
  var countEl = document.getElementById('history-count-label');
  var pagEl = document.getElementById('history-pagination');
  var search = ((document.getElementById('history-search') || {}).value || '').trim().toLowerCase();
  var side = (document.getElementById('history-side-filter') || {}).value || '';

  var filtered = _historyAllTrades.filter(function(t) {
    var sym = (t.symbol || '').toLowerCase();
    var matchSearch = !search || sym.includes(search);
    var isLong = t.side === 'CLOSE_LONG';
    var matchSide = !side || (side === 'LONG' && isLong) || (side === 'SHORT' && !isLong);
    return matchSearch && matchSide;
  });

  var totalPages = Math.max(1, Math.ceil(_historyTotalCount / _historyPageSize));
  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="12" class="px-6 py-8 text-center text-on-surface-variant text-xs">暂无符合条件的记录</td></tr>';
  } else {
    tbody.innerHTML = filtered.map(function(t) {
      var isLong = t.side === 'CLOSE_LONG';
      var sideClass = isLong ? 'text-[#49f4c8]' : 'text-[#ff716c]';
      var pnl = parseFloat(t.realized_pnl) || 0;
      var pnlClass = pnl >= 0 ? 'text-[#49f4c8]' : 'text-[#ff716c]';
      var pnlPct = t.pnl_pct != null ? parseFloat(t.pnl_pct) : null;
      return '<tr class="hover:bg-surface-container/50 transition-colors">' +
        '<td class="px-5 py-3.5 text-on-surface-variant monospace whitespace-nowrap text-xs leading-5">' +
          '<div>' + fmtTime(t.open_time) + '</div>' +
          '<div class="text-[#49f4c8]/70">' + fmtTime(t.close_time || t.trade_time) + '</div></td>' +
        '<td class="px-5 py-3.5 text-on-surface-variant monospace whitespace-nowrap text-xs">' + fmtDuration(t.open_time, t.close_time || t.trade_time) + '</td>' +
        '<td class="px-5 py-3.5 font-bold font-headline uppercase whitespace-nowrap">' + (t.symbol || '--') + '</td>' +
        '<td class="px-5 py-3.5 font-bold text-xs ' + sideClass + '">' + (isLong ? 'LONG' : 'SHORT') + '</td>' +
        '<td class="px-5 py-3.5 monospace whitespace-nowrap">' + fmtPrice(t.entry_price) + '</td>' +
        '<td class="px-5 py-3.5 monospace whitespace-nowrap">' + fmtPrice(t.price) + '</td>' +
        '<td class="px-5 py-3.5 text-xs text-on-surface-variant max-w-[140px] truncate" title="' + (t.entry_source || t.entry_reason || '') + '">' + (t.entry_source || t.entry_reason || '--') + '</td>' +
        '<td class="px-5 py-3.5 text-xs text-on-surface-variant max-w-[140px] truncate" title="' + (t.close_reason || '') + '">' + (t.close_reason || '--') + '</td>' +
        '<td class="px-5 py-3.5 monospace text-right whitespace-nowrap text-on-surface-variant">' + (t.margin != null ? fmtUsdt(t.margin) : '--') + '</td>' +
        '<td class="px-5 py-3.5 monospace text-right whitespace-nowrap text-on-surface-variant">' + (t.fee != null ? fmtUsdt(t.fee) : '--') + '</td>' +
        '<td class="px-5 py-3.5 monospace text-right whitespace-nowrap ' + pnlClass + '">' + fmtPnl(pnl) + ' U</td>' +
        '<td class="px-5 py-3.5 monospace text-right whitespace-nowrap ' + pnlClass + '">' + (pnlPct != null ? pnlPct.toFixed(2) + '%' : '--') + '</td>' +
        '</tr>';
    }).join('');
  }

  if (countEl) countEl.textContent = '共 ' + _historyTotalCount + ' 条  第 ' + _historyPage + ' / ' + totalPages + ' 页';
  if (pagEl) {
    var btnClass = 'px-3 py-1 rounded text-xs font-mono border transition-colors ';
    var html = '';
    html += '<button ' + (_historyPage <= 1 ? 'disabled ' : '') + 'onclick="loadHistory(' + (_historyPage - 1) + ')" class="' + btnClass + 'border-outline-variant/20 text-on-surface-variant hover:bg-surface-container disabled:opacity-30">&lsaquo;</button>';
    var pages = [];
    if (totalPages <= 7) { for (var i = 1; i <= totalPages; i++) pages.push(i); }
    else {
      pages = [1, 2];
      if (_historyPage > 4) pages.push('...');
      for (var p = Math.max(3, _historyPage - 1); p <= Math.min(totalPages - 2, _historyPage + 1); p++) pages.push(p);
      if (_historyPage < totalPages - 3) pages.push('...');
      pages.push(totalPages - 1, totalPages);
    }
    pages.forEach(function(p) {
      if (p === '...') html += '<span class="px-2 text-on-surface-variant text-xs">...</span>';
      else {
        var active = p === _historyPage;
        html += '<button onclick="loadHistory(' + p + ')" class="' + btnClass + (active ? 'bg-primary text-background border-primary font-bold' : 'border-outline-variant/20 text-on-surface-variant hover:bg-surface-container') + '">' + p + '</button>';
      }
    });
    html += '<button ' + (_historyPage >= totalPages ? 'disabled ' : '') + 'onclick="loadHistory(' + (_historyPage + 1) + ')" class="' + btnClass + 'border-outline-variant/20 text-on-surface-variant hover:bg-surface-container disabled:opacity-30">&rsaquo;</button>';
    pagEl.innerHTML = html;
  }
}

async function loadHistory(page) {
  if (page !== undefined) _historyPage = page;
  var tbody = document.getElementById('history-tbody');
  var limitEl = document.getElementById('history-limit');
  _historyPageSize = limitEl ? parseInt(limitEl.value) || 30 : 30;
  if (tbody) tbody.innerHTML = '<tr><td colspan="12" class="px-6 py-8 text-center text-on-surface-variant text-xs">加载中...</td></tr>';

  try {
    var res = await fetch('/api/futures/trades?account_id=' + ACCOUNT_ID + '&page=' + _historyPage + '&page_size=' + _historyPageSize);
    var data = await res.json();
    _historyAllTrades = Array.isArray(data) ? data : (Array.isArray(data.data) ? data.data : []);
    _historyTotalCount = data.total_count || 0;
  } catch(e) {
    if (tbody) tbody.innerHTML = '<tr><td colspan="12" class="px-6 py-8 text-center text-[#ff716c] text-xs">加载失败</td></tr>';
    return;
  }
  applyHistoryFilter(false);
}

async function loadAccountInfo() {
  try {
    var res = await fetch('/api/futures/account/' + ACCOUNT_ID);
    if (!res.ok) return;
    var data = await res.json();
    var acc = data.data || data;
    var elWL = document.getElementById('stat-win-loss');
    var elWin = document.getElementById('stat-win-rate');
    if (elWL && acc.winning_trades != null && acc.losing_trades != null) {
      var wins = parseInt(acc.winning_trades, 10) || 0;
      var losses = parseInt(acc.losing_trades, 10) || 0;
      elWL.innerHTML =
        '<span class="text-[#49f4c8]">' + wins + '盈</span>' +
        '<span class="text-on-surface-variant mx-1">/</span>' +
        '<span class="text-[#ff716c]">' + losses + '亏</span>';
    }
    if (elWin && acc.win_rate != null) {
      elWin.textContent = '胜率 ' + parseFloat(acc.win_rate).toFixed(1) + '%';
    }
    if (acc.total_trades != null) document.getElementById('stat-total-trades').textContent = acc.total_trades;
    if (acc.current_balance != null) document.getElementById('stat-balance').textContent = fmtUsdt(acc.current_balance);
    if (acc.realized_pnl != null) {
      var rpnl = parseFloat(acc.realized_pnl);
      var el = document.getElementById('stat-total-pnl');
      el.textContent = fmtPnl(rpnl);
      el.className = 'text-2xl font-headline font-bold monospace ' + (rpnl >= 0 ? 'text-[#49f4c8]' : 'text-[#ff716c]');
    }
  } catch(e) {}
}

document.addEventListener('DOMContentLoaded', function() {
  loadAccountInfo();
  loadHistory(1);
  document.getElementById('history-search').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') loadHistory(1);
  });
});
</script>
</body></html>
