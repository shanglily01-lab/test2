<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>登录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
               background: #0d1117; color: #e6edf3; display: flex; align-items: center;
               justify-content: center; min-height: 100vh; padding: 24px; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 16px;
                padding: 36px 28px; width: 100%; max-width: 360px; }
        .icon { font-size: 40px; text-align: center; margin-bottom: 16px; }
        h1 { font-size: 20px; font-weight: 700; text-align: center; margin-bottom: 6px; }
        .sub { font-size: 13px; color: #8b949e; text-align: center; margin-bottom: 28px; }
        label { font-size: 13px; color: #8b949e; display: block; margin-bottom: 6px; margin-top: 14px; }
        input[type=text], input[type=password] {
            width: 100%; background: #1c2128; border: 1px solid #30363d; border-radius: 10px;
            color: #e6edf3; font-size: 16px; padding: 12px 14px; outline: none;
            transition: border-color .2s;
        }
        input:focus { border-color: #4ecca3; }
        .err { font-size: 13px; color: #ef4444; margin-top: 10px; min-height: 18px; }
        .btn { width: 100%; margin-top: 20px; padding: 14px; background: #4ecca3; color: #0d1117;
               font-size: 15px; font-weight: 700; border: none; border-radius: 10px;
               cursor: pointer; transition: opacity .2s; }
        .btn:active { opacity: .8; }
        .btn:disabled { opacity: .5; cursor: not-allowed; }
    </style>
</head>
<body>
<div class="card">
    <div class="icon">🔐</div>
    <h1>超级大脑</h1>
    <p class="sub">请登录后继续</p>
    <label for="uname">用户名</label>
    <input type="text" id="uname" placeholder="用户名或邮箱" autocomplete="username" autocapitalize="none">
    <label for="pwd">密码</label>
    <input type="password" id="pwd" placeholder="密码" autocomplete="current-password">
    <div class="err" id="err"></div>
    <button class="btn" id="btn" onclick="login()">登录</button>
</div>
<script>
const SYS = '/api/system';
const params = new URLSearchParams(location.search);
const nextUrl = params.get('next') || '/m/live';

document.getElementById('pwd').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
});

async function login() {
    const username = document.getElementById('uname').value.trim();
    const password = document.getElementById('pwd').value;
    const err = document.getElementById('err');
    const btn = document.getElementById('btn');
    err.textContent = '';
    if (!username || !password) { err.textContent = '请输入用户名和密码'; return; }
    btn.textContent = '验证中…'; btn.disabled = true;
    try {
        const r = await fetch(`${SYS}/mobile/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password }),
            credentials: 'include'
        }).then(r => r.json());
        if (r.success) {
            // admin 跳转 settings，其他跳 next
            if (r.role === 'admin' && nextUrl === '/m/live') {
                location.href = nextUrl;
            } else {
                location.href = nextUrl;
            }
        } else {
            err.textContent = r.error || '登录失败';
            document.getElementById('pwd').value = '';
            document.getElementById('pwd').focus();
        }
    } catch(e) {
        err.textContent = '网络错误: ' + e.message;
    }
    btn.textContent = '登录'; btn.disabled = false;
}
</script>
</body>
</html>
