<!DOCTYPE html>
<html class="dark" lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>
<title>超级大脑 - 登录</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
tailwind.config = {
    darkMode: "class",
    theme: { extend: { colors: {
        "primary": "#49f4c8", "primary-container": "#00d4aa",
        "surface": "#0a0f14", "on-surface": "#ebeef5",
        "on-surface-variant": "#a8abb2", "outline-variant": "#44484e", "error": "#ff716c"
    }, fontFamily: { "headline": ["Space Grotesk"], "body": ["Manrope"] } } }
}
</script>
<style>
body { background:#070b10; font-family:'Manrope',sans-serif; color:#ebeef5;
    min-height:100dvh; min-height:100vh; -webkit-font-smoothing:antialiased;
    overscroll-behavior-y:contain; }
.material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }
.login-card { background:#0f1520; border:1px solid #1e2d45; }
.input-fill { background:#1a2235; }
.glow-button { box-shadow:0 0 20px rgba(73,244,200,.2); }
.bg-glow-top { position:fixed;top:-5%;right:-5%;width:240px;height:240px;border-radius:50%;
    background:rgba(73,244,200,.05);filter:blur(70px);pointer-events:none; }
.bg-glow-bottom { position:fixed;bottom:-5%;left:-5%;width:200px;height:200px;border-radius:50%;
    background:rgba(91,158,255,.05);filter:blur(60px);pointer-events:none; }
button,input,label { -webkit-tap-highlight-color:transparent; }
input[type="text"],input[type="password"] { font-size:16px; }
main { padding-bottom:max(env(safe-area-inset-bottom),24px); }
#toast { position:fixed;top:20px;left:50%;transform:translateX(-50%);
    background:#1a2235;color:#ebeef5;padding:8px 18px;border-radius:20px;
    font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity .2s;
    border:1px solid #44484e;white-space:nowrap;pointer-events:none; }
#toast.show { opacity:1; }
#toast.err { border-color:rgba(255,113,108,.3);color:#ff716c; }
</style>
</head>
<body class="flex flex-col min-h-screen overflow-x-hidden">
<div class="bg-glow-top"></div>
<div class="bg-glow-bottom"></div>
<div id="toast"></div>

<main class="flex-grow flex items-center justify-center p-5 sm:p-10 relative z-10">
<div class="login-card w-full max-w-sm rounded-2xl p-7 sm:p-10 flex flex-col items-center">
    <div class="mb-5 flex items-center justify-center w-14 h-14 bg-primary/10 rounded-xl">
        <span class="material-symbols-outlined text-[52px] text-primary" style="font-variation-settings:'FILL' 1;">psychology</span>
    </div>
    <div class="text-center mb-8">
        <h1 class="font-headline text-2xl font-bold tracking-tight text-on-surface">超级大脑</h1>
        <p class="text-[13px] font-medium tracking-wide text-[#6b7fa3] mt-1">量化交易平台</p>
    </div>
    <form class="w-full space-y-5" onsubmit="login(); return false;">
        <div class="space-y-2">
            <label class="text-[13px] font-semibold text-[#6b7fa3] ml-1" for="uname">用户名</label>
            <input id="uname"
                class="w-full h-12 px-4 input-fill border border-[#1e2d45] focus:border-primary focus:ring-0 rounded-[10px] text-on-surface placeholder-[#44484e] transition-all outline-none text-base"
                placeholder="请输入您的用户名" type="text"
                autocomplete="username" autocorrect="off" autocapitalize="none"/>
        </div>
        <div class="space-y-2">
            <label class="text-[13px] font-semibold text-[#6b7fa3] ml-1" for="pwd">密码</label>
            <div class="relative">
                <input id="pwd"
                    class="w-full h-12 px-4 pr-12 input-fill border border-[#1e2d45] focus:border-primary focus:ring-0 rounded-[10px] text-on-surface placeholder-[#44484e] transition-all outline-none text-base"
                    placeholder="请输入您的密码" type="password" autocomplete="current-password"/>
                <button class="absolute right-3 top-1/2 -translate-y-1/2 text-[#6b7fa3] hover:text-primary transition-colors w-9 h-9 flex items-center justify-center"
                    type="button" onclick="togglePwd(this)">
                    <span class="material-symbols-outlined text-[20px]">visibility_off</span>
                </button>
            </div>
        </div>
        <div id="err" style="display:none;" class="flex items-center gap-2 text-[13px] text-error px-1">
            <span class="material-symbols-outlined text-sm">error</span>
            <span id="err-text">用户名或密码错误</span>
        </div>
        <div class="pt-1">
            <button id="btn"
                class="w-full h-[52px] bg-gradient-to-r from-primary to-primary-container text-[#070b10] font-bold text-base rounded-xl glow-button hover:opacity-90 active:scale-[0.97] transition-all duration-200"
                type="submit">登 录</button>
        </div>
        <div class="flex items-center justify-between pt-1">
            <label class="flex items-center gap-2 cursor-pointer min-h-[44px]">
                <div class="relative flex items-center">
                    <input class="peer appearance-none w-4 h-4 rounded border border-[#1e2d45] bg-[#1a2235] checked:bg-primary checked:border-primary focus:ring-0 transition-all cursor-pointer" type="checkbox"/>
                    <span class="material-symbols-outlined absolute text-[12px] text-[#070b10] opacity-0 peer-checked:opacity-100 left-0.5">check</span>
                </div>
                <span class="text-[12px] text-[#6b7fa3]">记住登录</span>
            </label>
            <a class="text-[12px] text-[#6b7fa3] hover:text-primary transition-colors min-h-[44px] flex items-center px-1" href="#">忘记密码？</a>
        </div>
    </form>
    <div class="mt-10 w-full">
        <div class="h-[1px] w-full bg-[#1e2d45]/30"></div>
        <p class="text-center text-[10px] text-[#44484e] mt-5 tracking-widest uppercase">
            Secure Neural Network Encryption v4.0.2
        </p>
    </div>
</div>
</main>

<script>
const SYS = '/api/system';
const nextUrl = new URLSearchParams(location.search).get('next') || '/m/live';

function toast(msg, type='ok') {
    const el = document.getElementById('toast');
    el.textContent = msg; el.className = 'show ' + type;
    setTimeout(() => el.className = '', 2200);
}
function togglePwd(btn) {
    const input = document.getElementById('pwd');
    const icon = btn.querySelector('.material-symbols-outlined');
    input.type = input.type === 'password' ? 'text' : 'password';
    icon.textContent = input.type === 'password' ? 'visibility_off' : 'visibility';
}
function showErr(msg) {
    document.getElementById('err-text').textContent = msg;
    document.getElementById('err').style.display = 'flex';
}

async function login() {
    const username = document.getElementById('uname').value.trim();
    const password = document.getElementById('pwd').value;
    const btn = document.getElementById('btn');
    document.getElementById('err').style.display = 'none';
    if (!username || !password) { showErr('请输入用户名和密码'); return; }
    btn.textContent = '验证中…'; btn.disabled = true;
    try {
        const r = await fetch(`${SYS}/mobile/login`, {
            method: 'POST', credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        }).then(r => r.json());
        if (r.success) {
            if (r.access_token) localStorage.setItem('auth_token', r.access_token);
            location.href = nextUrl;
        } else {
            showErr(r.error || '登录失败');
            document.getElementById('pwd').value = '';
            document.getElementById('pwd').focus();
        }
    } catch(e) { showErr('网络错误: ' + e.message); }
    btn.textContent = '登 录'; btn.disabled = false;
}

document.getElementById('pwd').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
</script>
</body>
</html>
