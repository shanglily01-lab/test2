<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>U本位合约 · 手机版</title>
    <style>
        :root {
            --bg: #0d1117; --card: #161b22; --item: #1c2128; --border: #30363d;
            --blue: #2b6fed; --green: #10b981; --red: #ef4444; --yellow: #f59e0b;
            --text: #e6edf3; --muted: #8b949e;
            --radius: 12px; --gap: 12px;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Microsoft YaHei',sans-serif;
               background:var(--bg); color:var(--text); font-size:14px; padding-bottom:80px; }

        /* Top bar */
        .topbar { position:sticky; top:0; z-index:100; background:var(--card);
                  border-bottom:1px solid var(--border); padding:14px 16px;
                  display:flex; align-items:center; justify-content:space-between; }
        .topbar h1 { font-size:17px; font-weight:700; }
        .topbar-right { display:flex; align-items:center; gap:8px; }
        .status-dot { width:8px; height:8px; border-radius:50%; background:var(--red); flex-shrink:0;
                      animation:pulse 2s infinite; }
        .status-dot.on { background:var(--green); }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
        .refresh-btn { background:none; border:1px solid var(--border); color:var(--muted);
                       padding:6px 12px; border-radius:8px; font-size:13px; cursor:pointer; }
        .refresh-btn:active { background:var(--item); }

        /* Toast */
        #toast { position:fixed; top:70px; left:50%; transform:translateX(-50%);
                 background:#1f2937; color:var(--text); padding:10px 20px;
                 border-radius:20px; font-size:13px; z-index:999;
                 opacity:0; transition:opacity .3s; pointer-events:none; white-space:nowrap; }
        #toast.show { opacity:1; }
        #toast.ok  { background:#064e3b; border:1px solid var(--green); }
        #toast.err { background:#7f1d1d; border:1px solid var(--red); }

        /* Stats row */
        .stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; padding:12px 16px; }
        .stat { background:var(--card); border:1px solid var(--border); border-radius:10px;
                padding:12px 10px; text-align:center; }
        .stat-label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:4px; }
        .stat-value { font-size:18px; font-weight:700; font-family:monospace; }
        .stat-value.pos { color:var(--green); }
        .stat-value.neg { color:var(--red); }

        /* Section */
        .section { padding:0 16px; }
        .section-title { font-size:11px; font-weight:600; color:var(--muted);
                         text-transform:uppercase; letter-spacing:.8px; margin-bottom:8px; }

        /* Position card */
        .pos-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
                    margin-bottom:8px; overflow:hidden; }
        .pos-head { display:flex; align-items:center; justify-content:space-between;
                    padding:12px 14px; border-bottom:1px solid var(--border); }
        .pos-symbol { font-size:15px; font-weight:700; }
        .pos-badge { padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700;
                     text-transform:uppercase; }
        .pos-badge.long  { background:rgba(16,185,129,.15); color:var(--green); }
        .pos-badge.short { background:rgba(239,68,68,.12);  color:var(--red); }
        .pos-body { padding:12px 14px; display:grid; grid-template-columns:1fr 1fr; gap:8px; }
        .pos-field { }
        .pos-field-label { font-size:10px; color:var(--muted); margin-bottom:2px; }
        .pos-field-value { font-size:13px; font-weight:600; font-family:monospace; }
        .pnl-pos { color:var(--green); }
        .pnl-neg { color:var(--red); }
        .pos-foot { padding:10px 14px; border-top:1px solid var(--border);
                    display:flex; gap:8px; }
        .btn { flex:1; padding:10px; border:none; border-radius:8px; font-size:13px;
               font-weight:600; cursor:pointer; }
        .btn-close { background:rgba(239,68,68,.15); color:var(--red); border:1px solid rgba(239,68,68,.3); }
        .btn-close:active { background:rgba(239,68,68,.3); }

        /* Trading toggle */
        .trading-toggle { display:flex; align-items:center; justify-content:space-between;
                          background:var(--card); border:1px solid var(--border);
                          border-radius:var(--radius); padding:14px 16px; margin-bottom:var(--gap); }
        .toggle { position:relative; width:50px; height:28px; flex-shrink:0; }
        .toggle input { opacity:0; width:0; height:0; }
        .slider { position:absolute; inset:0; background:#374151; border-radius:28px;
                  cursor:pointer; transition:.25s; }
        .slider:before { content:''; position:absolute; width:22px; height:22px;
                          left:3px; top:3px; background:#fff; border-radius:50%; transition:.25s; }
        input:checked + .slider { background:var(--green); }
        input:checked + .slider:before { transform:translateX(22px); }

        /* Empty state */
        .empty { text-align:center; padding:40px 20px; color:var(--muted); }
        .empty-icon { font-size:40px; margin-bottom:10px; opacity:.5; }

        /* Auto refresh indicator */
        .auto-refresh { text-align:center; font-size:11px; color:var(--muted); padding:8px; }

        /* Confirm dialog */
        .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:200; }
        .dialog { background:var(--card); border:1px solid var(--border); border-radius:16px;
                  width:88vw; max-width:340px; padding:24px 20px;
                  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); }
        .dialog h3 { font-size:16px; margin-bottom:10px; }
        .dialog p { font-size:13px; color:var(--muted); margin-bottom:20px; }
        .dialog-btns { display:flex; gap:10px; }
        .dialog-btns button { flex:1; padding:11px; border-radius:8px; font-size:14px;
                              font-weight:600; cursor:pointer; border:none; }
        .btn-cancel { background:var(--item); color:var(--text); }
        .btn-confirm { background:var(--red); color:#fff; }

        /* Bottom nav */
        .bottom-nav { position:fixed; bottom:0; left:0; right:0; background:var(--card);
                      border-top:1px solid var(--border); display:flex; z-index:100; }
        .nav-item { flex:1; display:flex; flex-direction:column; align-items:center;
                    padding:10px 0 8px; text-decoration:none; color:var(--muted); font-size:10px;
                    gap:4px; }
        .nav-item.active { color:var(--blue); }
        .nav-item svg { width:22px; height:22px; }
    </style>
</head>
<body>

<div class="topbar">
    <h1>💵 U本位合约</h1>
    <div class="topbar-right">
        <span id="tradingDot" class="status-dot"></span>
        <span id="tradingText" style="font-size:12px;color:var(--muted);">…</span>
        <button class="refresh-btn" onclick="loadAll()">🔄</button>
    </div>
</div>
<div id="toast"></div>

<!-- Stats -->
<div class="stats-row">
    <div class="stat">
        <div class="stat-label">持仓数</div>
        <div class="stat-value" id="posCount">…</div>
    </div>
    <div class="stat">
        <div class="stat-label">未实现盈亏</div>
        <div class="stat-value" id="totalPnl">…</div>
    </div>
    <div class="stat">
        <div class="stat-label">近7日胜率</div>
        <div class="stat-value" id="winRate">…</div>
    </div>
</div>

<!-- Trading on/off -->
<div style="padding:0 16px 12px;">
    <div class="trading-toggle">
        <div>
            <div style="font-weight:600;font-size:14px;">自动交易</div>
            <div style="font-size:12px;color:var(--muted);margin-top:2px;" id="tradingLabel">加载中…</div>
        </div>
        <label class="toggle">
            <input type="checkbox" id="tradingToggle" onchange="toggleTrading(this.checked)">
            <span class="slider"></span>
        </label>
    </div>
</div>

<!-- Positions -->
<div class="section">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
        <div class="section-title" style="margin:0;">持仓列表</div>
        <span style="font-size:11px;color:var(--muted);" id="lastUpdate"></span>
    </div>
    <div id="positionsList"></div>
</div>

<!-- Confirm dialog -->
<div class="overlay" id="overlay" onclick="closeDialog()">
    <div class="dialog" onclick="event.stopPropagation()">
        <h3>确认平仓</h3>
        <p id="dialogMsg">确认要平掉这个仓位吗？</p>
        <div class="dialog-btns">
            <button class="btn-cancel" onclick="closeDialog()">取消</button>
            <button class="btn-confirm" id="dialogConfirm">确认平仓</button>
        </div>
    </div>
</div>

<!-- Auto refresh -->
<div class="auto-refresh" id="autoRefreshTip">每30秒自动刷新</div>

<!-- Bottom nav -->
<nav class="bottom-nav">
    <a href="/m/settings" class="nav-item">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
            <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        设置
    </a>
    <a href="/m/futures" class="nav-item active">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/>
        </svg>
        U本位
    </a>
    <a href="/m/live" class="nav-item">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/>
        </svg>
        实盘
    </a>
</nav>

<script>
const API = '/api/futures';
let pendingClose = null;

function toast(msg, type='ok') {
    const el=document.getElementById('toast');
    el.textContent=msg; el.className='show '+type;
    setTimeout(()=>el.className='',2200);
}

function fmt(n, d=2) {
    if(n==null||isNaN(n)) return '—';
    return parseFloat(n).toFixed(d);
}
function fmtPnl(n) {
    const v=parseFloat(n)||0;
    return (v>=0?'+':'')+v.toFixed(2)+'U';
}

async function loadTradingStatus() {
    try {
        const r = await fetch('/api/trading-control/status/2/usdt_futures').then(r=>r.json());
        const on = r.data?.is_trading_enabled || r.is_trading_enabled || false;
        document.getElementById('tradingDot').className='status-dot'+(on?' on':'');
        document.getElementById('tradingText').textContent=on?'交易中':'已暂停';
        document.getElementById('tradingLabel').textContent=on?'系统正在自动开仓':'已暂停自动开仓';
        document.getElementById('tradingToggle').checked=on;
    } catch(e) {}
}

async function toggleTrading(val) {
    try {
        const r = await fetch('/api/trading-control/toggle', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({account_id:2, trading_type:'usdt_futures', enabled:val})
        }).then(r=>r.json());
        if(r.success) { toast(val?'✅ 交易已启用':'⏸️ 交易已暂停'); loadTradingStatus(); }
        else toast('❌ 切换失败','err');
    } catch(e) { toast('❌ 请求失败','err'); }
}

async function loadStats() {
    try {
        const r = await fetch(`${API}/trades?account_id=2&page=1&page_size=50`).then(r=>r.json());
        if(r.success && r.data?.trades) {
            const trades = r.data.trades;
            const closed = trades.filter(t=>t.realized_pnl!=null);
            const wins = closed.filter(t=>parseFloat(t.realized_pnl)>0);
            const wr = closed.length ? Math.round(wins.length/closed.length*100) : 0;
            document.getElementById('winRate').textContent=wr+'%';
            document.getElementById('winRate').className='stat-value'+(wr>=50?' pos':' neg');
        }
    } catch(e) {}
}

async function loadPositions() {
    try {
        const posRes = await fetch(`${API}/positions?account_id=2&status=open`).then(r=>r.json());
        if(!posRes.success) return;
        const positions = posRes.data || [];

        document.getElementById('posCount').textContent = positions.length;
        document.getElementById('lastUpdate').textContent =
            '更新: ' + new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',second:'2-digit'});

        if(!positions.length) {
            document.getElementById('positionsList').innerHTML=
                '<div class="empty"><div class="empty-icon">📭</div>暂无持仓</div>';
            document.getElementById('totalPnl').textContent='0.00';
            document.getElementById('totalPnl').className='stat-value';
            return;
        }

        // Batch price fetch
        const symbols=[...new Set(positions.map(p=>p.symbol))];
        let priceMap={};
        try {
            const pr=await fetch(`${API}/prices/batch`,{method:'POST',
                headers:{'Content-Type':'application/json'},body:JSON.stringify({symbols})}).then(r=>r.json());
            if(pr.success) priceMap=pr.prices||{};
        } catch(e){}

        let totalPnl=0;
        const html = positions.map(pos=>{
            const ep=parseFloat(pos.entry_price)||0;
            const qty=parseFloat(pos.quantity)||0;
            const margin=parseFloat(pos.margin)||0;
            let cp=parseFloat(priceMap[pos.symbol]?.price)||parseFloat(pos.current_price)||0;
            let upnl=0, upnlPct=0;
            if(cp>0&&ep>0&&qty>0) {
                upnl = pos.position_side==='LONG' ? (cp-ep)*qty : (ep-cp)*qty;
                if(margin>0) upnlPct=upnl/margin*100;
            } else {
                upnl=parseFloat(pos.unrealized_pnl)||0;
                upnlPct=parseFloat(pos.unrealized_pnl_pct)||0;
            }
            totalPnl+=upnl;

            const isLong=pos.position_side==='LONG';
            const pnlClass=upnl>=0?'pnl-pos':'pnl-neg';
            const sl=pos.stop_loss_price?parseFloat(pos.stop_loss_price):null;
            const tp=pos.take_profit_price?parseFloat(pos.take_profit_price):null;

            return `<div class="pos-card">
              <div class="pos-head">
                <span class="pos-symbol">${pos.symbol.replace('/USDT','')}</span>
                <div style="display:flex;align-items:center;gap:8px;">
                  <span class="pos-badge ${isLong?'long':'short'}">${isLong?'做多':'做空'}</span>
                  <span class="${pnlClass}" style="font-weight:700;font-size:15px;font-family:monospace;">${fmtPnl(upnl)}</span>
                </div>
              </div>
              <div class="pos-body">
                <div class="pos-field">
                  <div class="pos-field-label">开仓价</div>
                  <div class="pos-field-value">${fmt(ep,4)}</div>
                </div>
                <div class="pos-field">
                  <div class="pos-field-label">当前价</div>
                  <div class="pos-field-value">${cp?fmt(cp,4):'—'}</div>
                </div>
                <div class="pos-field">
                  <div class="pos-field-label">数量</div>
                  <div class="pos-field-value">${fmt(qty,4)}</div>
                </div>
                <div class="pos-field">
                  <div class="pos-field-label">盈亏%</div>
                  <div class="pos-field-value ${pnlClass}">${upnlPct>=0?'+':''}${fmt(upnlPct,1)}%</div>
                </div>
                ${sl?`<div class="pos-field"><div class="pos-field-label">止损</div><div class="pos-field-value" style="color:var(--red)">${fmt(sl,4)}</div></div>`:''}
                ${tp?`<div class="pos-field"><div class="pos-field-label">止盈</div><div class="pos-field-value" style="color:var(--green)">${fmt(tp,4)}</div></div>`:''}
              </div>
              <div class="pos-foot">
                <button class="btn btn-close" onclick="confirmClose(${pos.id},'${pos.symbol}','${pos.position_side}')">
                  平仓
                </button>
              </div>
            </div>`;
        }).join('');

        document.getElementById('positionsList').innerHTML=html;
        const pnlEl=document.getElementById('totalPnl');
        pnlEl.textContent=(totalPnl>=0?'+':'')+totalPnl.toFixed(2)+'U';
        pnlEl.className='stat-value '+(totalPnl>=0?'pos':'neg');

    } catch(e) { console.error(e); }
}

function confirmClose(id, symbol, side) {
    pendingClose={id,symbol,side};
    document.getElementById('dialogMsg').textContent=`确认平掉 ${symbol} ${side==='LONG'?'做多':'做空'} 仓位？`;
    document.getElementById('dialogConfirm').onclick=doClose;
    document.getElementById('overlay').style.display='block';
}
function closeDialog() {
    document.getElementById('overlay').style.display='none';
    pendingClose=null;
}
async function doClose() {
    if(!pendingClose) return;
    closeDialog();
    try {
        const r=await fetch(`${API}/positions/${pendingClose.id}/close`,{
            method:'POST',headers:{'Content-Type':'application/json'},
            body:JSON.stringify({account_id:2,reason:'manual_mobile'})
        }).then(r=>r.json());
        if(r.success) { toast('✅ 平仓成功'); setTimeout(loadPositions,800); }
        else toast('❌ 平仓失败: '+(r.message||''),'err');
    } catch(e) { toast('❌ 请求失败','err'); }
}

async function loadAll() {
    await Promise.all([loadTradingStatus(), loadPositions(), loadStats()]);
}

loadAll();
setInterval(loadAll, 30000);
</script>
</body>
</html>
