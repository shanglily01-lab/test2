<!DOCTYPE html>
<html class="dark" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>顾问审核记录 | Neural Obsidian</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Manrope:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  body { font-family: 'Manrope', sans-serif; }
  h1 { font-family: 'Space Grotesk', sans-serif; }
  .mono { font-family: 'JetBrains Mono', monospace; }
  .tab-active { color: #49f4c8; border-bottom: 2px solid #49f4c8; }
  .chip { display: inline-flex; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; }
  .chip-approve { background: rgba(73,244,200,0.12); color: #49f4c8; }
  .chip-reject { background: rgba(255,113,108,0.12); color: #ff716c; }
  .chip-sell { background: rgba(255,113,108,0.15); color: #ff716c; }
  .chip-hold { background: rgba(73,244,200,0.1); color: #49f4c8; }
  .chip-observe { background: rgba(168,171,178,0.12); color: #a8abb2; }
</style>
<script>
  tailwind.config = { darkMode: "class", theme: { extend: { colors: {
    primary: "#49f4c8", surface: "#0a0f14", "on-surface": "#ebeef5",
    "on-surface-variant": "#a8abb2", "surface-container": "#151a20",
    "outline-variant": "#44484e"
  }}}};
</script>
</head>
<body class="bg-[#0a0f14] text-[#ebeef5]">

{% include "partials/desktop_sidebar.html" %}
<main class="ml-[240px] min-h-screen px-8 py-6">
<header class="flex items-center justify-between mb-6 pb-4 border-b border-[#44484e]/40">
  <div>
    <h1 class="text-2xl font-bold">顾问审核记录</h1>
    <p class="text-xs text-[#a8abb2] mt-1">Gemini / DeepSeek 开仓审核 · Gemini 持仓审核 · 近 7 日汇总 · 列表仅最近 500 条</p>
  </div>
  <button onclick="loadAll()" class="flex items-center gap-1 px-3 py-2 rounded-lg bg-[#151a20] hover:bg-[#1a2027] text-xs">
    <span class="material-symbols-outlined text-[16px]">refresh</span>刷新
  </button>
</header>

<div id="notReady" class="hidden mb-4 p-4 rounded-xl bg-amber-500/10 border border-amber-500/30 text-amber-200 text-sm"></div>

<div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
  <div class="bg-[#151a20] rounded-xl p-4 border border-[#44484e]/30">
    <div class="text-[10px] uppercase text-[#a8abb2]">开仓通过</div>
    <div id="statOpenApprove" class="text-2xl font-bold mt-1 mono text-[#49f4c8]">—</div>
  </div>
  <div class="bg-[#151a20] rounded-xl p-4 border border-[#44484e]/30">
    <div class="text-[10px] uppercase text-[#a8abb2]">开仓拒绝</div>
    <div id="statOpenReject" class="text-2xl font-bold mt-1 mono text-[#ff716c]">—</div>
  </div>
  <div class="bg-[#151a20] rounded-xl p-4 border border-[#44484e]/30">
    <div class="text-[10px] uppercase text-[#a8abb2]">持仓 sell (7d)</div>
    <div id="statHoldSell" class="text-2xl font-bold mt-1 mono">—</div>
  </div>
  <div class="bg-[#151a20] rounded-xl p-4 border border-[#44484e]/30">
    <div class="text-[10px] uppercase text-[#a8abb2]">持仓问询 (7d)</div>
    <div id="statHoldTotal" class="text-2xl font-bold mt-1 mono">—</div>
  </div>
</div>

<div class="flex gap-4 border-b border-[#44484e]/40 mb-4">
  <button id="tabOpen" onclick="setTab('open')" class="px-4 py-2 text-sm tab-active">开仓审核</button>
  <button id="tabHold" onclick="setTab('hold')" class="px-4 py-2 text-sm text-[#a8abb2]">持仓审核</button>
</div>

<div class="flex flex-wrap items-end gap-3 mb-4">
  <div class="relative flex-1 min-w-[200px] max-w-sm group">
    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-[#a8abb2] text-lg group-focus-within:text-[#49f4c8]">search</span>
    <input id="searchInput" type="text" placeholder="交易对 / 来源 / 理由 / 决策..."
           class="w-full bg-[#151a20] border border-[#44484e]/40 rounded-lg pl-10 pr-4 py-2 text-xs text-[#ebeef5] placeholder-[#a8abb2] focus:outline-none focus:border-[#49f4c8]/50"/>
  </div>
  <select id="providerFilter" class="bg-[#151a20] border border-[#44484e]/40 rounded-lg px-3 py-2 text-xs text-[#ebeef5] focus:outline-none focus:border-[#49f4c8]/50">
    <option value="all">全部顾问</option>
    <option value="gemini">Gemini</option>
    <option value="deepseek">DeepSeek</option>
    <option value="gpt">GPT</option>
  </select>
  <select id="decisionFilter" class="bg-[#151a20] border border-[#44484e]/40 rounded-lg px-3 py-2 text-xs text-[#ebeef5] focus:outline-none focus:border-[#49f4c8]/50">
    <option value="">全部决策</option>
  </select>
  <button onclick="doSearch()" class="flex items-center gap-1 px-4 py-2 rounded-lg bg-[#49f4c8] text-[#0a0f14] text-xs font-semibold hover:opacity-90">
    <span class="material-symbols-outlined text-[16px]">search</span>搜索
  </button>
  <button onclick="resetSearch()" class="px-3 py-2 rounded-lg bg-[#151a20] hover:bg-[#1a2027] border border-[#44484e]/40 text-xs text-[#a8abb2]">重置</button>
  <span id="resultCount" class="text-xs text-[#a8abb2] mono ml-auto"></span>
</div>

<div class="bg-[#151a20] rounded-xl border border-[#44484e]/30 overflow-hidden">
<table class="w-full text-xs">
<thead class="bg-[#0a0f14] text-[#a8abb2] uppercase tracking-wider">
<tr>
  <th class="px-3 py-2 text-left">顾问</th>
  <th class="px-3 py-2 text-left">时间 (UTC+8)</th>
  <th class="px-3 py-2 text-left">决策</th>
  <th class="px-3 py-2 text-left">Symbol</th>
  <th class="px-3 py-2 text-left">方向</th>
  <th class="px-3 py-2 text-left">来源</th>
  <th class="px-3 py-2 text-left">持仓h / ROI</th>
  <th class="px-3 py-2 text-left">理由</th>
</tr>
</thead>
<tbody id="reviewBody" class="divide-y divide-[#44484e]/20"></tbody>
</table>
<p id="emptyMsg" class="hidden p-6 text-center text-[#a8abb2] text-sm">暂无记录</p>
<div class="flex items-center justify-between px-4 py-3 border-t border-[#44484e]/30 text-xs text-[#a8abb2]">
  <span id="pageInfo" class="mono"></span>
  <div id="pageBtns" class="flex items-center gap-1"></div>
</div>
</div>
</main>

<script>
var currentTab = 'open';
var currentPage = 1;
var pageSize = 50;
var totalItems = 0;

var OPEN_DECISIONS = [
  { v: '', l: '全部决策' },
  { v: 'approve', l: 'approve 通过' },
  { v: 'reject', l: 'reject 拒绝' }
];
var HOLD_DECISIONS = [
  { v: '', l: '全部决策' },
  { v: 'hold', l: 'hold 持有' },
  { v: 'observe', l: 'observe 观察' },
  { v: 'sell', l: 'sell 平仓' }
];

function chipClass(decision, type) {
  if (type === 'open') {
    return decision === 'approve' ? 'chip chip-approve' : 'chip chip-reject';
  }
  if (decision === 'sell') return 'chip chip-sell';
  if (decision === 'hold') return 'chip chip-hold';
  return 'chip chip-observe';
}

function parseUtcTime(t) {
  if (!t) return null;
  try {
    var ts = (typeof t === 'string' && !t.endsWith('Z') && !/[+-]\d{2}:\d{2}$/.test(t)) ? t + 'Z' : t;
    var d = new Date(ts);
    return isNaN(d.getTime()) ? null : d;
  } catch (e) { return null; }
}

function fmtTimeUtc8(t) {
  var d = parseUtcTime(t);
  if (!d) return '—';
  var u = new Date(d.getTime() + 8 * 3600000);
  var pad = function(x) { return String(x).padStart(2, '0'); };
  return u.getUTCFullYear() + '-' + pad(u.getUTCMonth() + 1) + '-' + pad(u.getUTCDate())
    + ' ' + pad(u.getUTCHours()) + ':' + pad(u.getUTCMinutes()) + ':' + pad(u.getUTCSeconds());
}

function updateDecisionOptions() {
  var sel = document.getElementById('decisionFilter');
  var opts = currentTab === 'open' ? OPEN_DECISIONS : HOLD_DECISIONS;
  sel.innerHTML = opts.map(function(o) {
    return '<option value="' + o.v + '">' + o.l + '</option>';
  }).join('');
}

function setTab(t) {
  currentTab = t;
  currentPage = 1;
  document.getElementById('tabOpen').className = t === 'open' ? 'px-4 py-2 text-sm tab-active' : 'px-4 py-2 text-sm text-[#a8abb2]';
  document.getElementById('tabHold').className = t === 'hold' ? 'px-4 py-2 text-sm tab-active' : 'px-4 py-2 text-sm text-[#a8abb2]';
  updateDecisionOptions();
  loadReviews();
}

function doSearch() {
  currentPage = 1;
  loadReviews();
}

function resetSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('decisionFilter').value = '';
  document.getElementById('providerFilter').value = 'all';
  currentPage = 1;
  loadReviews();
}

function goPage(p) {
  var totalPages = Math.ceil(totalItems / pageSize) || 1;
  if (p < 1 || p > totalPages) return;
  currentPage = p;
  loadReviews();
}

function renderPagination() {
  var totalPages = Math.ceil(totalItems / pageSize) || 1;
  document.getElementById('pageInfo').textContent =
    totalItems > 0 ? ('共 ' + totalItems + ' 条 · 第 ' + currentPage + ' / ' + totalPages + ' 页') : '';
  var html = '';
  var btnCls = 'px-2 py-1 rounded border border-[#44484e]/40 text-[#a8abb2] hover:border-[#49f4c8] hover:text-[#49f4c8] disabled:opacity-30 disabled:cursor-not-allowed transition-all';
  html += '<button onclick="goPage(' + (currentPage - 1) + ')" ' + (currentPage <= 1 ? 'disabled' : '') + ' class="' + btnCls + '">«</button>';
  var start = Math.max(1, currentPage - 2);
  var end = Math.min(totalPages, currentPage + 2);
  for (var p = start; p <= end; p++) {
    var active = p === currentPage;
    html += '<button onclick="goPage(' + p + ')" class="px-2 py-1 rounded border ' +
      (active ? 'border-[#49f4c8] text-[#49f4c8] bg-[#49f4c8]/10' : 'border-[#44484e]/40 text-[#a8abb2] hover:border-[#49f4c8] hover:text-[#49f4c8]') +
      ' transition-all">' + p + '</button>';
  }
  html += '<button onclick="goPage(' + (currentPage + 1) + ')" ' + (currentPage >= totalPages ? 'disabled' : '') + ' class="' + btnCls + '">»</button>';
  document.getElementById('pageBtns').innerHTML = totalItems > 0 ? html : '';
}

async function loadSummary() {
  var r = await fetch('/api/advisor/summary');
  var d = await r.json();
  if (!d.ready) {
    document.getElementById('notReady').textContent = d.message || '表未就绪';
    document.getElementById('notReady').classList.remove('hidden');
    return;
  }
  document.getElementById('notReady').classList.add('hidden');
  document.getElementById('statOpenApprove').textContent = d.open_approve || 0;
  document.getElementById('statOpenReject').textContent = d.open_reject || 0;
  document.getElementById('statHoldSell').textContent = d.hold_sell || 0;
  document.getElementById('statHoldTotal').textContent = d.hold_total || 0;
}

async function loadReviews() {
  var q = (document.getElementById('searchInput').value || '').trim();
  var decision = document.getElementById('decisionFilter').value || '';
  var provider = document.getElementById('providerFilter').value || 'all';
  var offset = (currentPage - 1) * pageSize;
  var params = new URLSearchParams({
    review_type: currentTab,
    limit: String(pageSize),
    offset: String(offset)
  });
  if (q) params.set('q', q);
  if (decision) params.set('decision', decision);
  if (provider && provider !== 'all') params.set('provider', provider);

  var body = document.getElementById('reviewBody');
  body.innerHTML = '<tr><td colspan="8" class="px-3 py-8 text-center text-[#a8abb2]">加载中...</td></tr>';
  document.getElementById('emptyMsg').classList.add('hidden');

  var r = await fetch('/api/advisor/reviews?' + params.toString());
  var d = await r.json();
  totalItems = d.total || 0;
  var capNote = (d.recent_cap && totalItems >= d.recent_cap) ? (' · 仅显示最近 ' + d.recent_cap + ' 条') : '';
  document.getElementById('resultCount').textContent =
    totalItems > 0 ? ('匹配 ' + totalItems + ' 条' + capNote) : (q || decision ? '无匹配结果' : '');

  body.innerHTML = '';
  if (!d.reviews || d.reviews.length === 0) {
    document.getElementById('emptyMsg').classList.remove('hidden');
    renderPagination();
    return;
  }
  document.getElementById('emptyMsg').classList.add('hidden');
  d.reviews.forEach(function(row) {
    var tr = document.createElement('tr');
    tr.className = 'hover:bg-[#1a2027]/50';
    var holdCol = '—';
    if (row.hold_hours != null) {
      holdCol = row.hold_hours.toFixed(1) + 'h';
      if (row.roi_pct != null) holdCol += ' / ' + (row.roi_pct >= 0 ? '+' : '') + row.roi_pct.toFixed(1) + '%';
    }
    var providerLabel = row.provider === 'deepseek' ? 'DeepSeek'
      : (row.provider === 'gpt' ? 'GPT' : 'Gemini');
    tr.innerHTML =
      '<td class="px-3 py-2 mono text-[#a8abb2]">' + providerLabel + '</td>' +
      '<td class="px-3 py-2 mono text-[#a8abb2]">' + fmtTimeUtc8(row.created_at) + '</td>' +
      '<td class="px-3 py-2"><span class="' + chipClass(row.decision, currentTab) + '">' + row.decision + '</span></td>' +
      '<td class="px-3 py-2 font-medium">' + row.symbol + '</td>' +
      '<td class="px-3 py-2">' + (row.position_side || '—') + '</td>' +
      '<td class="px-3 py-2 mono text-[#a8abb2]">' + (row.source || '—') + '</td>' +
      '<td class="px-3 py-2 mono">' + holdCol + '</td>' +
      '<td class="px-3 py-2 text-[#a8abb2] max-w-md truncate" title="' + (row.reason || '').replace(/"/g, '&quot;') + '">' + (row.reason || '—') + '</td>';
    body.appendChild(tr);
  });
  renderPagination();
}

function loadAll() {
  loadSummary();
  loadReviews();
}

updateDecisionOptions();
document.getElementById('searchInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doSearch();
});
loadAll();
</script>
</body>
</html>
