<!DOCTYPE html>
<html class="dark" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AI Shadow 对比 | Neural Obsidian</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Manrope:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  body { font-family: 'Manrope', sans-serif; }
  h1, h2 { font-family: 'Space Grotesk', sans-serif; }
  .mono { font-family: 'JetBrains Mono', monospace; }
  .chip { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; }
  .chip-bull { background: rgba(73,244,200,0.12); color: #49f4c8; }
  .chip-bear { background: rgba(255,113,108,0.12); color: #ff716c; }
  .chip-skip { background: rgba(168,171,178,0.1); color: #a8abb2; }
  .row-click { cursor: pointer; }
  .row-click:hover { background: rgba(73,244,200,0.04); }
  .row-active { background: rgba(73,244,200,0.08); border-left: 2px solid #49f4c8; }
  .source-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 1rem; }
  @media (max-width: 1024px) { .source-grid { grid-template-columns: 1fr; } }
  .provider-col { background: linear-gradient(180deg, rgba(21,26,32,0.95) 0%, rgba(15,20,26,0.6) 100%); border: 1px solid rgba(68,72,78,0.35); border-radius: 14px; overflow: hidden; }
  .provider-head { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border-bottom: 1px solid rgba(68,72,78,0.25); }
  .provider-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .provider-gemini .provider-dot { background: #49f4c8; box-shadow: 0 0 10px rgba(73,244,200,0.5); }
  .provider-deepseek .provider-dot { background: #7c8aff; box-shadow: 0 0 10px rgba(124,138,255,0.45); }
  .provider-gpt .provider-dot { background: #74aa9c; box-shadow: 0 0 10px rgba(116,170,156,0.45); }
  .source-item { padding: 10px 14px; border-bottom: 1px solid rgba(68,72,78,0.15); transition: background 0.15s; }
  .source-item:last-child { border-bottom: none; }
  .source-item:hover { background: rgba(255,255,255,0.02); }
  .rate-bar { height: 4px; border-radius: 999px; background: rgba(68,72,78,0.4); overflow: hidden; margin-top: 6px; }
  .rate-fill { height: 100%; border-radius: 999px; transition: width 0.4s ease; }
  .rate-good { color: #49f4c8; }
  .rate-warn { color: #fbbf24; }
  .rate-bad { color: #ff716c; }
  .fill-good { background: linear-gradient(90deg, #2dd4a8, #49f4c8); }
  .fill-warn { background: linear-gradient(90deg, #d97706, #fbbf24); }
  .fill-bad { background: linear-gradient(90deg, #dc2626, #ff716c); }
  .source-pill { font-size: 10px; padding: 2px 7px; border-radius: 6px; background: rgba(68,72,78,0.35); color: #a8abb2; }
  .provider-avg { font-size: 11px; color: #a8abb2; margin-left: auto; }
</style>
<script>
  tailwind.config = { darkMode: "class", theme: { extend: { colors: {
    primary: "#49f4c8", surface: "#0a0f14", "on-surface": "#ebeef5",
    "on-surface-variant": "#a8abb2", "surface-container": "#151a20",
    "outline-variant": "#44484e"
  }}}};
</script>
</head>
<body class="bg-[#0a0f14] text-[#ebeef5]">

{% include "partials/desktop_sidebar.html" %}
<main class="ml-[240px] min-h-screen px-8 py-6">
<header class="flex items-center justify-between mb-6 pb-4 border-b border-[#44484e]/40">
  <div>
    <h1 class="text-2xl font-bold">AI Shadow 对比</h1>
    <p class="text-xs text-[#a8abb2] mt-1">Teacher (Gemini/DeepSeek) vs 本地规则引擎 · 不开仓 · 规则 <span class="mono text-primary">v1</span></p>
  </div>
  <div class="flex items-center gap-3">
    <select id="filterSource" onchange="loadRuns()" class="text-xs bg-[#151a20] border border-[#44484e] rounded-lg px-3 py-2 text-[#ebeef5] max-w-[200px]">
      <option value="">全部来源</option>
      <optgroup label="Gemini">
        <option value="gemini_explore">gemini_explore</option>
        <option value="gemini_predict">gemini_predict</option>
      </optgroup>
      <optgroup label="DeepSeek">
        <option value="deepseek_explore">deepseek_explore</option>
        <option value="deepseek_predict">deepseek_predict</option>
      </optgroup>
      <optgroup label="GPT">
        <option value="gpt_predict">gpt_predict</option>
      </optgroup>
    </select>
    <button onclick="loadAll()" class="flex items-center gap-1 px-3 py-2 rounded-lg bg-[#151a20] hover:bg-[#1a2027] text-xs">
      <span class="material-symbols-outlined text-[16px]">refresh</span>刷新
    </button>
  </div>
</header>

<div id="notReady" class="hidden mb-4 p-4 rounded-xl bg-amber-500/10 border border-amber-500/30 text-amber-200 text-sm"></div>

<!-- 汇总卡片 -->
<div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">
  <div class="bg-[#151a20] rounded-xl p-4 border border-[#44484e]/30">
    <div class="text-[10px] uppercase tracking-wider text-[#a8abb2]">对比轮数</div>
    <div id="statRuns" class="text-2xl font-bold mt-1 mono">—</div>
  </div>
  <div class="bg-[#151a20] rounded-xl p-4 border border-[#44484e]/30">
    <div class="text-[10px] uppercase tracking-wider text-[#a8abb2]">平均一致率</div>
    <div id="statAgree" class="text-2xl font-bold mt-1 mono text-primary">—</div>
  </div>
  <div class="bg-[#151a20] rounded-xl p-4 border border-[#44484e]/30">
    <div class="text-[10px] uppercase tracking-wider text-[#a8abb2]">对比 symbol 总数</div>
    <div id="statCompared" class="text-2xl font-bold mt-1 mono">—</div>
  </div>
</div>

<!-- 按来源一致率 -->
<section class="mb-6 bg-[#151a20] rounded-xl border border-[#44484e]/30 overflow-hidden">
  <div class="px-4 py-3 border-b border-[#44484e]/30 flex items-center justify-between gap-3">
    <div class="flex items-center gap-2">
      <span class="material-symbols-outlined text-[18px] text-primary">hub</span>
      <span class="text-sm font-semibold">按来源 · Teacher vs Shadow 一致率</span>
    </div>
    <span class="text-[10px] text-[#a8abb2]">≥50% 良好 · 40–50% 观察 · &lt;40% 需优化</span>
  </div>
  <div id="statBySource" class="p-4">
    <div class="text-xs text-[#a8abb2] text-center py-6">加载中…</div>
  </div>
</section>

<div id="runsSection" class="grid grid-cols-1 xl:grid-cols-2 gap-6">
  <!-- 运行列表 -->
  <section class="bg-[#151a20] rounded-xl border border-[#44484e]/30 overflow-hidden">
    <div class="px-4 py-3 border-b border-[#44484e]/30 text-sm font-semibold">最近对比轮次</div>
    <div class="overflow-x-auto max-h-[520px] overflow-y-auto">
      <table class="w-full text-xs">
        <thead class="sticky top-0 bg-[#1a2027] text-[#a8abb2]">
          <tr>
            <th class="text-left px-3 py-2">ID</th>
            <th class="text-left px-3 py-2">来源</th>
            <th class="text-left px-3 py-2">Teacher#</th>
            <th class="text-right px-3 py-2">一致率</th>
            <th class="text-right px-3 py-2">可交易</th>
            <th class="text-left px-3 py-2">时间</th>
          </tr>
        </thead>
        <tbody id="runsBody"></tbody>
      </table>
    </div>
  </section>

  <!-- 差异明细 -->
  <section class="bg-[#151a20] rounded-xl border border-[#44484e]/30 overflow-hidden">
    <div class="px-4 py-3 border-b border-[#44484e]/30 flex items-center justify-between">
      <span class="text-sm font-semibold">差异明细</span>
      <span id="detailTitle" class="text-[10px] text-[#a8abb2]">点击左侧一行查看</span>
    </div>
    <div class="overflow-x-auto max-h-[520px] overflow-y-auto">
      <table class="w-full text-xs">
        <thead class="sticky top-0 bg-[#1a2027] text-[#a8abb2]">
          <tr>
            <th class="text-left px-3 py-2">Symbol</th>
            <th class="text-left px-3 py-2">Teacher</th>
            <th class="text-left px-3 py-2">Shadow</th>
            <th class="text-left px-3 py-2">原因</th>
          </tr>
        </thead>
        <tbody id="verdictsBody">
          <tr><td colspan="4" class="px-4 py-8 text-center text-[#a8abb2]">请选择一轮对比</td></tr>
        </tbody>
      </table>
    </div>
  </section>
</div>
</main>

<script>
var selectedRunId = null;

function catChip(cat) {
  var c = (cat || 'skip').toLowerCase();
  var cls = c === 'bullish' ? 'chip-bull' : (c === 'bearish' ? 'chip-bear' : 'chip-skip');
  return '<span class="chip ' + cls + '">' + c + '</span>';
}

function fmtConf(v) {
  if (v == null) return '—';
  return Number(v).toFixed(2);
}

var STRATEGY_ZH = {
  explore: '探索', predict: '预测'
};
var STRATEGY_ORDER = ['explore', 'predict'];
var PROVIDER_META = {
  gemini: { label: 'Gemini', cls: 'provider-gemini' },
  deepseek: { label: 'DeepSeek', cls: 'provider-deepseek' },
  gpt: { label: 'GPT', cls: 'provider-gpt' }
};

function parseSourceKey(src) {
  var parts = (src || '').split('_');
  var provider = parts[0] || 'other';
  var strategy = parts.slice(1).join('_') || 'other';
  return { provider: provider, strategy: strategy, raw: src };
}

function rateTier(pct) {
  var p = Number(pct) || 0;
  if (p >= 50) return { cls: 'rate-good', fill: 'fill-good' };
  if (p >= 40) return { cls: 'rate-warn', fill: 'fill-warn' };
  return { cls: 'rate-bad', fill: 'fill-bad' };
}

function renderBySource(items) {
  var box = document.getElementById('statBySource');
  if (!items || !items.length) {
    box.innerHTML = '<div class="text-xs text-[#a8abb2] text-center py-8">暂无按来源数据</div>';
    return;
  }
  var grouped = { gemini: [], deepseek: [], gpt: [], other: [] };
  items.forEach(function(s) {
    var p = parseSourceKey(s.teacher_source);
    var bucket = grouped[p.provider] ? p.provider : 'other';
    grouped[bucket].push(Object.assign({}, s, { _strategy: p.strategy }));
  });
  ['gemini', 'deepseek', 'gpt'].forEach(function(k) {
    grouped[k].sort(function(a, b) {
      var ia = STRATEGY_ORDER.indexOf(a._strategy);
      var ib = STRATEGY_ORDER.indexOf(b._strategy);
      if (ia < 0) ia = 99;
      if (ib < 0) ib = 99;
      return ia - ib || String(a.teacher_source).localeCompare(b.teacher_source);
    });
  });
  var html = '<div class="source-grid">';
  ['gemini', 'deepseek', 'gpt'].forEach(function(prov) {
    var list = grouped[prov];
    if (!list.length) return;
    var meta = PROVIDER_META[prov];
    var sumRuns = 0, sumPct = 0;
    list.forEach(function(s) {
      sumRuns += Number(s.runs) || 0;
      sumPct += (Number(s.avg_agree_pct) || 0) * (Number(s.runs) || 0);
    });
    var avgPct = sumRuns ? (sumPct / sumRuns).toFixed(1) : '—';
    var avgTier = rateTier(avgPct);
    html += '<div class="provider-col ' + meta.cls + '">';
    html += '<div class="provider-head">';
    html += '<span class="provider-dot"></span>';
    html += '<span class="text-sm font-semibold">' + meta.label + '</span>';
    html += '<span class="provider-avg">均 <span class="mono ' + avgTier.cls + '">' + avgPct + '%</span> · ' + sumRuns + ' 轮</span>';
    html += '</div>';
    list.forEach(function(s) {
      var pct = Number(s.avg_agree_pct) || 0;
      var tier = rateTier(pct);
      var stratZh = STRATEGY_ZH[s._strategy] || s._strategy;
      var barW = Math.min(100, Math.max(0, pct));
      html += '<div class="source-item cursor-pointer" data-source="' + s.teacher_source + '" title="点击筛选 ' + s.teacher_source + '">';
      html += '<div class="flex items-center justify-between gap-2">';
      html += '<div class="flex items-center gap-2 min-w-0">';
      html += '<span class="text-sm font-medium truncate">' + stratZh + '</span>';
      html += '<span class="source-pill mono shrink-0">' + (s.runs || 0) + ' 轮</span>';
      html += '</div>';
      html += '<span class="mono text-sm font-bold shrink-0 ' + tier.cls + '">' + pct.toFixed(1) + '%</span>';
      html += '</div>';
      html += '<div class="rate-bar"><div class="rate-fill ' + tier.fill + '" style="width:' + barW + '%"></div></div>';
      html += '</div>';
    });
    html += '</div>';
  });
  html += '</div>';
  box.innerHTML = html;
  box.querySelectorAll('.source-item[data-source]').forEach(function(el) {
    el.addEventListener('click', function() {
      var src = el.getAttribute('data-source');
      var sel = document.getElementById('filterSource');
      sel.value = src;
      loadRuns();
      var sec = document.getElementById('runsSection');
      if (sec) sec.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  });
}

async function loadSummary() {
  var res = await fetch('/api/ai-shadow/summary');
  var data = await res.json();
  var box = document.getElementById('notReady');
  if (!data.ready) {
    box.textContent = data.message || '数据表未就绪';
    box.classList.remove('hidden');
    return;
  }
  box.classList.add('hidden');
  document.getElementById('statRuns').textContent = data.total_runs;
  document.getElementById('statAgree').textContent = data.avg_agree_pct + '%';
  document.getElementById('statCompared').textContent = data.total_compared;
  renderBySource(data.by_source || []);
}

async function loadRuns() {
  var src = document.getElementById('filterSource').value;
  var url = '/api/ai-shadow/runs?limit=40' + (src ? '&teacher_source=' + encodeURIComponent(src) : '');
  var res = await fetch(url);
  var data = await res.json();
  var tbody = document.getElementById('runsBody');
  tbody.innerHTML = '';
  if (!data.runs || !data.runs.length) {
    tbody.innerHTML = '<tr><td colspan="6" class="px-4 py-8 text-center text-[#a8abb2]">暂无对比数据 (需 explore 跑完且 migration 005 已执行)</td></tr>';
    return;
  }
  data.runs.forEach(function(r) {
    var tr = document.createElement('tr');
    tr.className = 'row-click border-t border-[#44484e]/20' + (selectedRunId === r.id ? ' row-active' : '');
    tr.onclick = function() { selectRun(r.id, r.teacher_source, r.teacher_run_id); };
    var agree = r.agree_pct != null ? r.agree_pct + '%' : '—';
    var trade = (r.tradeable_agree || 0) + ' / T' + (r.teacher_tradeable||0) + ' S' + (r.shadow_tradeable||0);
    tr.innerHTML =
      '<td class="px-3 py-2 mono">' + r.id + '</td>' +
      '<td class="px-3 py-2">' + r.teacher_source + '</td>' +
      '<td class="px-3 py-2 mono">' + r.teacher_run_id + '</td>' +
      '<td class="px-3 py-2 text-right mono text-primary">' + agree + '</td>' +
      '<td class="px-3 py-2 text-right mono text-[#a8abb2]">' + trade + '</td>' +
      '<td class="px-3 py-2 text-[#a8abb2]">' + (r.created_at || '') + '</td>';
    tbody.appendChild(tr);
  });
  if (!selectedRunId && data.runs[0]) {
    selectRun(data.runs[0].id, data.runs[0].teacher_source, data.runs[0].teacher_run_id);
  }
}

async function selectRun(id, source, teacherRunId) {
  selectedRunId = id;
  document.getElementById('detailTitle').textContent = '#' + id + ' · ' + source + ' run ' + teacherRunId;
  document.querySelectorAll('#runsBody tr').forEach(function(tr) {
    tr.classList.remove('row-active');
  });
  loadRuns();
  var res = await fetch('/api/ai-shadow/verdicts?shadow_run_id=' + id + '&disagreements_only=true&limit=100');
  var data = await res.json();
  var tbody = document.getElementById('verdictsBody');
  tbody.innerHTML = '';
  if (!data.verdicts || !data.verdicts.length) {
    tbody.innerHTML = '<tr><td colspan="4" class="px-4 py-6 text-center text-primary">本轮 category 全部一致 🎉</td></tr>';
    return;
  }
  data.verdicts.forEach(function(v) {
    var tr = document.createElement('tr');
    tr.className = 'border-t border-[#44484e]/20';
    var reason = (v.diff_reason || '').slice(0, 120);
    if (v.shadow_signals && v.shadow_signals.length) {
      reason += ' [' + v.shadow_signals.join(',') + ']';
    }
    tr.innerHTML =
      '<td class="px-3 py-2 font-medium">' + v.symbol + '</td>' +
      '<td class="px-3 py-2">' + catChip(v.teacher_category) + ' <span class="mono text-[#a8abb2]">' + fmtConf(v.teacher_confidence) + '</span></td>' +
      '<td class="px-3 py-2">' + catChip(v.shadow_category) + ' <span class="mono text-[#a8abb2]">' + fmtConf(v.shadow_confidence) + '</span></td>' +
      '<td class="px-3 py-2 text-[#a8abb2] text-[10px]">' + reason + '</td>';
    tbody.appendChild(tr);
  });
}

function loadAll() {
  loadSummary();
  loadRuns();
}

loadAll();
setInterval(loadAll, 120000);
</script>
  <script src="/static/js/system_i18n.js"></script>
</body></html>
