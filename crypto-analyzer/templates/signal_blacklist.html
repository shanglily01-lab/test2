    <p class="text-sm text-gray-400">еҲ йҷӨеҗҺж— жі•жҒўеӨҚпјҢзЎ®е®ҡиҰҒеҲ йҷӨиҜҘдҝЎеҸ·й»‘еҗҚеҚ•жқЎзӣ®еҗ—пј?/p>
    <p id="del-signal-type" class="text-xs font-mono text-gray-300 bg-[#0d1117] rounded px-3 py-2 break-all"></p>
    <div class="flex gap-3 pt-2">
      <button onclick="closeDelModal()" class="flex-1 py-2.5 rounded-lg bg-gray-800 hover:bg-gray-700 text-gray-300 font-bold text-sm transition-all">еҸ–ж¶Ҳ</button>
      <button onclick="confirmDelete()" class="flex-1 py-2.5 rounded-lg bg-status-danger hover:bg-red-600 text-white font-bold text-sm transition-all">зЎ®и®ӨеҲ йҷӨ</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="hidden fixed bottom-6 right-6 z-50 bg-[#0d1117] border border-gray-800 rounded-xl px-4 py-3 text-sm text-gray-200 shadow-xl flex items-center gap-2">
  <span id="toast-icon" class="material-symbols-outlined text-[18px] text-[#49f4c8]">check_circle</span>
  <span id="toast-msg"></span>
</div>

<script>
// в”Җв”Җ State в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
var currentSide = '';
var currentActiveFilter = null;
var currentPage = 1;
var pageSize = 30;
var totalItems = 0;
var searchTimer = null;
var modalIsActive = true;
var selectedDir = 'LONG';
var deleteTargetId = null;

// в”Җв”Җ Filters в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function setSide(side) {
  currentSide = side;
  currentPage = 1;
  ['all','long','short'].forEach(function(k) {
    var el = document.getElementById('seg-' + k);
    el.className = el.className.replace(/seg-active\S*/g,'').trim() + ' text-gray-400';
  });
  var key = side === 'LONG' ? 'long' : side === 'SHORT' ? 'short' : 'all';
  var el = document.getElementById('seg-' + key);
  el.className = el.className.replace('text-gray-400','').trim() + ' seg-active';
  loadData();
}

function setActiveFilter(val) {
  currentActiveFilter = val;
  currentPage = 1;
  ['all','active','inactive'].forEach(function(k) {
    var el = document.getElementById('seg-status-' + k);
    el.className = el.className.replace(/seg-active\S*/g,'').trim() + ' text-gray-400';
  });
  var key = val === 1 ? 'active' : val === 0 ? 'inactive' : 'all';
  var el = document.getElementById('seg-status-' + key);
  el.className = el.className.replace('text-gray-400','').trim() + ' seg-active';
  loadData();
}

function onSearchInput() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(function() {
    currentPage = 1;
    loadData();
  }, 300);
}

// в”Җв”Җ Load Data в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
async function loadData() {
  var tbody = document.getElementById('table-body');
  tbody.innerHTML = '<tr><td colspan="10" class="text-center text-gray-500 py-16">еҠ иҪҪдё?..</td></tr>';

  var q = document.getElementById('search-input').value.trim();
  var params = new URLSearchParams({ page: currentPage, page_size: pageSize });
  if (currentSide) params.set('side', currentSide);
  if (currentActiveFilter !== null) params.set('is_active', currentActiveFilter);
  if (q) params.set('q', q);

  try {
    var r = await fetch('/api/signal_blacklist?' + params.toString());
    var data = await r.json();
    if (!data.success) throw new Error(data.detail || 'еҠ иҪҪеӨұиҙҘ');

    totalItems = data.total;

    // Update stats
    document.getElementById('stat-total').textContent    = data.stats.total;
    document.getElementById('stat-active').textContent   = data.stats.active;
    document.getElementById('stat-inactive').textContent = data.stats.inactive;
    document.getElementById('stat-today').textContent    = data.stats.today;
    document.getElementById('total-badge').textContent   = 'е…?' + data.stats.total + ' жқ?;
    document.getElementById('result-count').textContent  = data.total > 0 ? ('зӯӣйҖүз»“жһ?' + data.total + ' жқ?) : '';

    renderTable(data.data);
    renderPagination();
  } catch(e) {
    tbody.innerHTML = '<tr><td colspan="10" class="text-center text-red-400 py-16">еҠ иҪҪеӨұиҙҘ: ' + esc(e.message) + '</td></tr>';
  }
}

// в”Җв”Җ Render Table в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function renderTable(rows) {
  var tbody = document.getElementById('table-body');
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="10" class="text-center text-gray-500 py-16">жҡӮж— ж•°жҚ®</td></tr>';
    return;
  }

  var html = '';
  rows.forEach(function(r) {
    var sideBadge = r.position_side === 'LONG'
      ? '<span class="px-2 py-0.5 text-[10px] font-bold rounded bg-red-500/15 text-red-400 border border-red-500/25">LONG</span>'
      : '<span class="px-2 py-0.5 text-[10px] font-bold rounded bg-blue-500/15 text-blue-400 border border-blue-500/25">SHORT</span>';

    var statusDot = r.is_active
      ? '<span class="inline-flex items-center gap-1.5 text-status-success text-xs"><span class="w-1.5 h-1.5 rounded-full bg-status-success"></span>е·ІеҗҜз”?/span>'
      : '<span class="inline-flex items-center gap-1.5 text-gray-500 text-xs"><span class="w-1.5 h-1.5 rounded-full bg-gray-600"></span>е·ІеҒңз”?/span>';

    var winRate = r.win_rate > 0 ? (r.win_rate * 100).toFixed(1) + '%' : '--';
    var totalLoss = r.total_loss < 0 ? '-$' + Math.abs(r.total_loss).toFixed(2) : (r.total_loss > 0 ? '$' + r.total_loss.toFixed(2) : '--');
    var lossClass = r.total_loss < 0 ? 'text-status-danger' : 'text-gray-400';
    var createdAt = r.created_at ? r.created_at.substring(0,10) : '--';

    html += '<tr class="data-row border-b border-gray-800/50 transition-colors">';
    html += '<td class="px-4 py-3 text-gray-500 text-xs">' + r.id + '</td>';
    html += '<td class="px-4 py-3 max-w-xs"><span class="text-xs font-mono text-gray-200 break-all">' + esc(r.signal_type) + '</span></td>';
    html += '<td class="px-4 py-3 text-center">' + sideBadge + '</td>';
    html += '<td class="px-4 py-3 text-center">' + statusDot + '</td>';
    html += '<td class="px-4 py-3 text-right text-xs ' + (parseFloat(winRate) < 40 ? 'text-status-danger' : 'text-gray-300') + '">' + winRate + '</td>';
    html += '<td class="px-4 py-3 text-right text-xs ' + lossClass + '">' + totalLoss + '</td>';
    html += '<td class="px-4 py-3 text-right text-xs text-gray-400">' + (r.order_count || '--') + '</td>';
    html += '<td class="px-4 py-3 text-xs text-gray-500">' + createdAt + '</td>';
    html += '<td class="px-4 py-3 text-xs text-gray-500 max-w-[140px] truncate" title="' + esc(r.notes) + '">' + esc(r.notes || '--') + '</td>';
    html += '<td class="px-4 py-3">';
    html += '<div class="flex items-center justify-center gap-1">';
    html += '<button class="action-btn text-[#49f4c8]/70 hover:text-[#49f4c8]" onclick="openEditModal(' + JSON.stringify(r) + ')" title="зј–иҫ‘"><span class="material-symbols-outlined text-base">edit</span></button>';
    var toggleIcon = r.is_active ? 'toggle_on' : 'toggle_off';
    var toggleColor = r.is_active ? 'text-status-warning/70 hover:text-status-warning' : 'text-gray-500 hover:text-gray-300';
    html += '<button class="action-btn ' + toggleColor + '" onclick="doToggle(' + r.id + ')" title="' + (r.is_active ? 'еҒңз”Ё' : 'еҗҜз”Ё') + '"><span class="material-symbols-outlined text-base">' + toggleIcon + '</span></button>';
    html += '<button class="action-btn text-gray-500 hover:text-status-danger" onclick="openDelModal(' + r.id + ', \'' + esc(r.signal_type) + '\')" title="еҲ йҷӨ"><span class="material-symbols-outlined text-base">delete</span></button>';
    html += '</div></td>';
    html += '</tr>';
  });

  tbody.innerHTML = html;
}

// в”Җв”Җ Pagination в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function renderPagination() {
  var totalPages = Math.ceil(totalItems / pageSize) || 1;
  document.getElementById('page-info').textContent = 'е…?' + totalItems + ' жқ? з¬?' + currentPage + ' / ' + totalPages + ' йЎ?;

  var html = '';
  // Prev
  html += '<button onclick="goPage(' + (currentPage-1) + ')" ' + (currentPage <= 1 ? 'disabled' : '') + ' class="px-2 py-1 rounded border border-gray-800 text-gray-400 hover:border-[#49f4c8] hover:text-[#49f4c8] disabled:opacity-30 disabled:cursor-not-allowed transition-all">В«</button>';

  var start = Math.max(1, currentPage - 2);
  var end   = Math.min(totalPages, currentPage + 2);
  for (var p = start; p <= end; p++) {
    var active = p === currentPage;
    html += '<button onclick="goPage(' + p + ')" class="px-2 py-1 rounded border ' + (active ? 'border-[#49f4c8] text-[#49f4c8] bg-[#49f4c8]/10' : 'border-gray-800 text-gray-400 hover:border-[#49f4c8] hover:text-[#49f4c8]') + ' transition-all">' + p + '</button>';
  }

  // Next
  html += '<button onclick="goPage(' + (currentPage+1) + ')" ' + (currentPage >= totalPages ? 'disabled' : '') + ' class="px-2 py-1 rounded border border-gray-800 text-gray-400 hover:border-[#49f4c8] hover:text-[#49f4c8] disabled:opacity-30 disabled:cursor-not-allowed transition-all">В»</button>';

  document.getElementById('page-btns').innerHTML = html;
}

function goPage(p) {
  var totalPages = Math.ceil(totalItems / pageSize) || 1;
  if (p < 1 || p > totalPages) return;
  currentPage = p;
  loadData();
}

// в”Җв”Җ Modal (Add/Edit) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function openAddModal() {
  document.getElementById('modal-id').value = '';
  document.getElementById('modal-signal-type').value = '';
  document.getElementById('modal-notes').value = '';
  document.getElementById('modal-error').classList.add('hidden');
  document.getElementById('modal-stats').classList.add('hidden');
  document.getElementById('modal-title').textContent = 'ж·»еҠ дҝЎеҸ·й»‘еҗҚеҚ?;
  selectDir('LONG');
  setModalActive(true);
  document.getElementById('modal').classList.remove('hidden');
  setTimeout(function(){ document.getElementById('modal-signal-type').focus(); }, 50);
}

function openEditModal(row) {
  document.getElementById('modal-id').value = row.id;
  document.getElementById('modal-signal-type').value = row.signal_type || '';
  document.getElementById('modal-notes').value = row.notes || '';
  document.getElementById('modal-error').classList.add('hidden');
  document.getElementById('modal-title').textContent = 'зј–иҫ‘дҝЎеҸ·й»‘еҗҚеҚ?;
  selectDir(row.position_side || 'LONG');
  setModalActive(row.is_active === 1 || row.is_active === true);

  // Show stats
  var statsEl = document.getElementById('modal-stats');
  if (row.win_rate > 0 || row.total_loss !== 0 || row.order_count > 0) {
    statsEl.classList.remove('hidden');
    document.getElementById('stat-wr').textContent    = row.win_rate > 0 ? (row.win_rate * 100).toFixed(1) + '%' : '--';
    document.getElementById('stat-loss').textContent  = row.total_loss < 0 ? '-$' + Math.abs(row.total_loss).toFixed(2) : '--';
    document.getElementById('stat-cnt').textContent   = row.order_count || '--';
  } else {
    statsEl.classList.add('hidden');
  }

  document.getElementById('modal').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('modal').classList.add('hidden');
}

function selectDir(dir) {
  selectedDir = dir;
  var longBtn  = document.getElementById('dir-long');
  var shortBtn = document.getElementById('dir-short');
  if (dir === 'LONG') {
    longBtn.className  = longBtn.className.replace(/border-gray-800|text-gray-400/g,'').trim()  + ' border-red-500/50 text-red-400 bg-red-500/10';
    shortBtn.className = shortBtn.className.replace(/border-red-500\/50|text-red-400|bg-red-500\/10|border-blue-500\/50|text-blue-400|bg-blue-500\/10/g,'').trim() + ' border-gray-800 text-gray-400';
  } else {
    shortBtn.className = shortBtn.className.replace(/border-gray-800|text-gray-400/g,'').trim()  + ' border-blue-500/50 text-blue-400 bg-blue-500/10';
    longBtn.className  = longBtn.className.replace(/border-red-500\/50|text-red-400|bg-red-500\/10|border-blue-500\/50|text-blue-400|bg-blue-500\/10/g,'').trim() + ' border-gray-800 text-gray-400';
  }
}

function setModalActive(val) {
  modalIsActive = val;
  var btn   = document.getElementById('toggle-active');
  var thumb = document.getElementById('toggle-thumb');
  if (val) {
    btn.className   = btn.className.replace('bg-gray-700','').trim() + ' bg-[#49f4c8]';
    thumb.className = thumb.className.replace('left-0.5','').trim() + ' left-6';
  } else {
    btn.className   = btn.className.replace('bg-[#49f4c8]','').trim() + ' bg-gray-700';
    thumb.className = thumb.className.replace('left-6','').trim() + ' left-0.5';
  }
}

function toggleActive() {
  setModalActive(!modalIsActive);
}

async function submitForm() {
  var id         = document.getElementById('modal-id').value;
  var signalType = document.getElementById('modal-signal-type').value.trim();
  var notes      = document.getElementById('modal-notes').value.trim();
  var errEl      = document.getElementById('modal-error');
  errEl.classList.add('hidden');

  if (!signalType) {
    errEl.textContent = 'иҜ·иҫ“е…ҘдҝЎеҸ·зұ»еһ?;
    errEl.classList.remove('hidden');
    return;
  }

  var body = {
    signal_type:   signalType,
    position_side: selectedDir,
    is_active:     modalIsActive ? 1 : 0,
    notes:         notes || null,
  };

  try {
    var url    = id ? '/api/signal_blacklist/' + id : '/api/signal_blacklist';
    var method = id ? 'PUT' : 'POST';
    var r = await fetch(url, {
      method:  method,
      headers: {'Content-Type': 'application/json'},
      body:    JSON.stringify(body),
    });
    var data = await r.json();
    if (!data.success) throw new Error(data.detail || 'дҝқеӯҳеӨұиҙҘ');
    closeModal();
    showToast(id ? 'жӣҙж–°жҲҗеҠҹ' : 'ж·»еҠ жҲҗеҠҹ', 'check_circle', '#49f4c8');
    loadData();
  } catch(e) {
    errEl.textContent = e.message;
    errEl.classList.remove('hidden');
  }
}

// в”Җв”Җ Toggle в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
async function doToggle(id) {
  try {
    var r = await fetch('/api/signal_blacklist/' + id + '/toggle', { method: 'POST' });
    var data = await r.json();
    if (!data.success) throw new Error(data.detail || 'еҲҮжҚўеӨұиҙҘ');
    showToast(data.message, 'info', '#facc15');
    loadData();
  } catch(e) {
    showToast('еҲҮжҚўеӨұиҙҘ: ' + e.message, 'error', '#ef4444');
  }
}

// в”Җв”Җ Delete в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function openDelModal(id, signalType) {
  deleteTargetId = id;
  document.getElementById('del-signal-type').textContent = signalType;
  document.getElementById('del-modal').classList.remove('hidden');
}

function closeDelModal() {
  deleteTargetId = null;
  document.getElementById('del-modal').classList.add('hidden');
}

async function confirmDelete() {
  if (!deleteTargetId) return;
  try {
    var r = await fetch('/api/signal_blacklist/' + deleteTargetId, { method: 'DELETE' });
    var data = await r.json();
    if (!data.success) throw new Error(data.detail || 'еҲ йҷӨеӨұиҙҘ');
    closeDelModal();
    showToast('еҲ йҷӨжҲҗеҠҹ', 'check_circle', '#49f4c8');
    loadData();
  } catch(e) {
    showToast('еҲ йҷӨеӨұиҙҘ: ' + e.message, 'error', '#ef4444');
  }
}

// в”Җв”Җ Toast в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function showToast(msg, icon, color) {
  var toast = document.getElementById('toast');
  document.getElementById('toast-msg').textContent  = msg;
  var iconEl = document.getElementById('toast-icon');
  iconEl.textContent  = icon === 'error' ? 'error' : (icon || 'check_circle');
  iconEl.style.color  = color || '#49f4c8';
  toast.classList.remove('hidden');
  setTimeout(function(){ toast.classList.add('hidden'); }, 3000);
}

// в”Җв”Җ Helpers в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// в”Җв”Җ Init в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
document.querySelectorAll('#sidebar-nav .nav-item').forEach(function(a) {
  if (a.dataset.path && window.location.pathname === a.dataset.path) {
    a.classList.add('nav-active');
  }
});

document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
document.getElementById('del-modal').addEventListener('click', function(e) {
  if (e.target === this) closeDelModal();
});

loadData();
</script>
